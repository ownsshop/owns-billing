<style>
  :root {
    --primary: 14, 165, 233;
    --bg: 248, 250, 252;
    --card: 255, 255, 255;
    --text: 15, 23, 42;
    --border: 226, 232, 240;
    --header-h: 64px;
  }
  .dark {
    --bg: 15, 23, 42;
    --card: 30, 41, 59;
    --text: 226, 232, 240;
    --border: 51, 65, 85;
  }
  * { touch-action: manipulation; }
  body { 
    background: rgb(var(--bg)); 
    color: rgb(var(--text)); 
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overscroll-behavior: none;
  }
  body.no-scroll { overflow: hidden; }
  .glass { background: rgba(var(--card), 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .skeleton { background: linear-gradient(90deg, rgba(var(--border),0.2) 25%, rgba(var(--border),0.4) 50%, rgba(var(--border),0.2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .fade-in { animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .scale-in { animation: scaleIn 0.2s ease-out; }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(var(--primary), 0.5); border-radius: 3px; }
  
  #sidebar { 
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    top: 0;
    height: 100vh;
  }
  #sidebar-overlay {
    transition: opacity 0.3s ease-out;
    backdrop-filter: blur(4px);
  }
  
  .table-container {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  
  .main-wrapper {
    padding-top: var(--header-h);
  }
  
  @media (min-width: 768px) {
    .main-wrapper {
      padding-top: 0;
    }
  }
  
  @media print {
    body * { visibility: hidden; }
    .print-area, .print-area * { visibility: visible; }
    .print-area { position: absolute; left: 0; top: 0; width: 100%; }
    .print-a4 { width: 210mm; padding: 15mm; }
    .print-thermal { width: 58mm; padding: 2mm; font-size: 12px; }
    .no-print { display: none !important; }
  }

  @media (max-width: 768px) {
    .table-container table { min-width: 600px; }
  }
  
  .bottom-nav-item {
    transition: all 0.2s;
  }
  .bottom-nav-item.active {
    color: rgb(var(--primary));
    transform: translateY(-2px);
  }
</style>

<body class="antialiased">
<div id="app" class="min-h-screen flex flex-col"></div>

<!-- Mobile Sidebar Overlay -->
<div id="sidebar-overlay" class="fixed inset-0 z-[45] bg-black/50 hidden opacity-0 md:hidden"></div>

<!-- Toast Container -->
<div id="toast-container" class="fixed top-4 right-4 z-[100] space-y-2 px-4 md:px-0"></div>

<!-- Command Palette -->
<div id="command-palette" class="fixed inset-0 z-[90] bg-black/50 backdrop-blur-sm hidden items-start justify-center pt-[10vh]" onclick="window.toggleCommandPalette(false)">
  <div class="w-full max-w-2xl mx-4 glass rounded-2xl shadow-2xl border border-[rgb(var(--border))] scale-in" onclick="event.stopPropagation()">
    <div class="p-4 border-b border-[rgb(var(--border))] flex items-center gap-3">
      <i data-lucide="search" class="w-5 h-5 text-[rgb(var(--primary))]"></i>
      <input id="cmd-search" type="text" placeholder="Type a command or search..." class="flex-1 bg-transparent outline-none text-sm">
      <kbd class="text-xs px-2 py-1 rounded bg-[rgb(var(--border))]">ESC</kbd>
    </div>
    <div id="cmd-results" class="max-h-80 overflow-y-auto p-2"></div>
  </div>
</div>

<!-- Modals Container -->
<div id="modal-container"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, collection, query, where, orderBy, onSnapshot, serverTimestamp, Timestamp, limit } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBZUlhoH3pPZWBmBZko-SfIJpV6jBoefRM",
    authDomain: "owns-billing.firebaseapp.com",
    projectId: "owns-billing",
    storageBucket: "owns-billing.firebasestorage.app",
    messagingSenderId: "1036958677443",
    appId: "1:1036958677443:web:5541baa54edc6e5f582576"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let currentUser = null;
  let currentRole = null;
  let currentUserData = null;
  let companySettings = {};
  let darkMode = localStorage.getItem('theme') === 'dark';
  let sidebarOpen = false;
  let touchStartX = 0;
  let touchEndX = 0;
  
  const appState = {
    users: [],
    customers: [],
    packages: [],
    bills: [],
    complaints: [],
    activities: [],
    zones: [],
    chats: [],
    unsubscribers: []
  };

  // Theme init - apply immediately
  const applyTheme = () => {
    document.documentElement.classList.toggle('dark', darkMode);
    document.querySelector('meta[name="theme-color"]').setAttribute('content', darkMode ? '#1e293b' : '#0ea5e9');
    localStorage.setItem('theme', darkMode ? 'dark' : 'light');
  };
  applyTheme();

  // Utils
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);
  
  const formatCurrency = (num) => `৳${Number(num || 0).toLocaleString('en-IN')}`;
  const formatDate = (ts) => {
    if (!ts) return '-';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  };
  const formatDateTime = (ts) => {
    if (!ts) return '-';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  };
  const debounce = (fn, delay) => {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn(...args), delay);
    };
  };

  window.showToast = (msg, type = 'info') => {
    const colors = { success: 'bg-emerald-500', error: 'bg-rose-500', info: 'bg-sky-500', warning: 'bg-amber-500' };
    const icons = { success: 'check-circle', error: 'x-circle', info: 'info', warning: 'alert-triangle' };
    const toast = document.createElement('div');
    toast.className = `${colors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 fade-in min-w-[280px] max-w-[calc(100vw-2rem)]`;
    toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5 flex-shrink-0"></i><span class="flex-1 text-sm font-medium">${msg}</span>`;
    $('#toast-container').appendChild(toast);
    lucide.createIcons();
    setTimeout(() => {
      toast.classList.add('opacity-0', 'translate-y-[-10px]', 'transition-all', 'duration-300');
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  };

  const logActivity = async (action, details) => {
    try {
      await addDoc(collection(db, 'activities'), {
        userId: currentUser?.uid,
        userName: currentUserData?.name || currentUser?.email,
        role: currentRole,
        action, details,
        timestamp: serverTimestamp()
      });
    } catch (e) { console.error(e); }
  };

  window.toggleTheme = () => {
    darkMode = !darkMode;
    applyTheme();
    setTimeout(() => lucide.createIcons(), 50);
    showToast(darkMode ? 'Dark mode enabled' : 'Light mode enabled', 'info');
  };

  window.toggleCommandPalette = (show) => {
    const el = $('#command-palette');
    if (show === undefined) show = el.classList.contains('hidden');
    el.classList.toggle('hidden', !show);
    el.classList.toggle('flex', show);
    if (show) setTimeout(() => $('#cmd-search')?.focus(), 50);
  };

  // Sidebar Management
  window.toggleSidebar = (show = null) => {
    const sidebar = $('#sidebar');
    const overlay = $('#sidebar-overlay');
    if (!sidebar || !overlay) return;
    
    if (show === null) show = !sidebarOpen;
    sidebarOpen = show;
    
    if (window.innerWidth < 768) {
      if (show) {
        sidebar.classList.remove('-translate-x-full');
        sidebar.classList.add('translate-x-0');
        overlay.classList.remove('hidden', 'opacity-0');
        overlay.classList.add('opacity-100');
        document.body.classList.add('no-scroll');
      } else {
        sidebar.classList.add('-translate-x-full');
        sidebar.classList.remove('translate-x-0');
        overlay.classList.remove('opacity-100');
        overlay.classList.add('opacity-0');
        setTimeout(() => overlay.classList.add('hidden'), 300);
        document.body.classList.remove('no-scroll');
      }
    }
  };

  window.closeSidebar = () => toggleSidebar(false);

  // Auth Handler
  onAuthStateChanged(auth, async (user) => {
    appState.unsubscribers.forEach(unsub => unsub());
    appState.unsubscribers = [];
    
    if (user) {
      currentUser = user;
      const userDoc = await getDoc(doc(db, 'users', user.uid));
      if (userDoc.exists()) {
        currentUserData = { id: user.uid, ...userDoc.data() };
        currentRole = currentUserData.role;
        await loadSettings();
        await initRealtimeListeners();
        renderApp();
      } else {
        showToast('User profile not found', 'error');
        signOut(auth);
      }
    } else {
      currentUser = null;
      currentRole = null;
      renderLogin();
    }
  });

  const loadSettings = async () => {
    const snap = await getDoc(doc(db, 'settings', 'company'));
    if (snap.exists()) companySettings = snap.data();
  };

  const initRealtimeListeners = async () => {
    let usersQuery = collection(db, 'users');
    if (currentRole === 'staff') usersQuery = query(usersQuery, where('assignedStaff', '==', currentUser.uid));
    if (currentRole === 'customer') usersQuery = query(usersQuery, where('__name__', '==', currentUser.uid));
    
    appState.unsubscribers.push(onSnapshot(usersQuery, (snap) => {
      appState.users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentRoute.startsWith('customers') || currentRoute.startsWith('staff')) renderRoute();
    }));

    appState.unsubscribers.push(onSnapshot(collection(db, 'packages'), (snap) => {
      appState.packages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }));

    let billsQuery = query(collection(db, 'bills'), orderBy('createdAt', 'desc'), limit(500));
    if (currentRole === 'staff') billsQuery = query(billsQuery, where('staffId', '==', currentUser.uid));
    if (currentRole === 'customer') billsQuery = query(billsQuery, where('customerId', '==', currentUser.uid));
    
    appState.unsubscribers.push(onSnapshot(billsQuery, (snap) => {
      appState.bills = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentRoute === 'dashboard' || currentRoute.includes('bills')) renderRoute();
    }));

    let complaintsQuery = query(collection(db, 'complaints'), orderBy('createdAt', 'desc'));
    if (currentRole === 'staff') complaintsQuery = query(complaintsQuery, where('staffId', '==', currentUser.uid));
    if (currentRole === 'customer') complaintsQuery = query(complaintsQuery, where('customerId', '==', currentUser.uid));
    
    appState.unsubscribers.push(onSnapshot(complaintsQuery, (snap) => {
      appState.complaints = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentRoute.includes('complaints')) renderRoute();
    }));

    appState.unsubscribers.push(onSnapshot(collection(db, 'zones'), (snap) => {
      appState.zones = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }));

    if (currentRole === 'admin') {
      appState.unsubscribers.push(onSnapshot(query(collection(db, 'activities'), orderBy('timestamp', 'desc'), limit(100)), (snap) => {
        appState.activities = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }));
    }
  };

  // Router
  let currentRoute = 'dashboard';
  const navigate = (route) => {
    currentRoute = route;
    renderRoute();
    updateBottomNavActive();
    if (window.innerWidth < 768 && sidebarOpen) closeSidebar();
  };

  window.navigate = navigate;

  // Login UI
  const renderLogin = () => {
    $('#app').innerHTML = `
      <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-sky-50 to-indigo-100 dark:from-slate-900 dark:to-slate-800">
        <div class="w-full max-w-md glass rounded-3xl shadow-2xl p-8 border border-[rgb(var(--border))] fade-in">
          <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-sky-500 to-indigo-600 flex items-center justify-center">
              <span class="text-3xl font-bold text-white">O</span>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-sky-600 to-indigo-600 bg-clip-text text-transparent">OwnsBill</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">ISP Reseller Management System</p>
          </div>
          <form id="login-form" class="space-y-4">
            <div>
              <label class="text-sm font-medium mb-2 block">Email</label>
              <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))] focus:ring-2 focus:ring-sky-500 outline-none transition" placeholder="admin@owns.bd">
            </div>
            <div>
              <label class="text-sm font-medium mb-2 block">Password</label>
              <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))] focus:ring-2 focus:ring-sky-500 outline-none transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-sky-500 to-indigo-600 text-white font-semibold hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] transition">
              Sign In
            </button>
          </form>
          <div class="mt-6 text-center text-xs text-slate-500">
            Press <kbd class="px-2 py-1 rounded bg-[rgb(var(--border))]">Ctrl+K</kbd> for quick access
          </div>
        </div>
      </div>
    `;
    $('#login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = $('#email').value;
      const password = $('#password').value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        showToast('Welcome back!', 'success');
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
    lucide.createIcons();
  };

  // Main App Layout
  const renderApp = () => {
    const menus = {
      admin: [
        { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
        { id: 'customers', label: 'Customers', icon: 'users' },
        { id: 'staff', label: 'Staff', icon: 'user-cog' },
        { id: 'packages', label: 'Packages', icon: 'package' },
        { id: 'bills', label: 'Bills', icon: 'receipt' },
        { id: 'invoice', label: 'Invoice Generator', icon: 'file-text' },
        { id: 'complaints', label: 'Complaints', icon: 'message-circle-warning' },
        { id: 'reports', label: 'Reports', icon: 'bar-chart-3' },
        { id: 'activities', label: 'Activity Log', icon: 'history' },
        { id: 'settings', label: 'Settings', icon: 'settings' }
      ],
      staff: [
        { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
        { id: 'mycustomers', label: 'My Customers', icon: 'users' },
        { id: 'bills', label: 'Bills', icon: 'receipt' },
        { id: 'invoice', label: 'Invoice Generator', icon: 'file-text' },
        { id: 'complaints', label: 'Complaints', icon: 'message-circle-warning' },
        { id: 'reports', label: 'Reports', icon: 'bar-chart-3' }
      ],
      customer: [
        { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
        { id: 'mybills', label: 'My Bills', icon: 'receipt' },
        { id: 'profile', label: 'Profile', icon: 'user' },
        { id: 'complaints', label: 'Complaints', icon: 'message-circle-warning' },
        { id: 'chat', label: 'Chat', icon: 'messages-square' }
      ]
    };

    const sidebarItems = menus[currentRole].map(item => `
      <button onclick="navigate('${item.id}')" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-[rgb(var(--border))] transition ${currentRoute === item.id ? 'bg-sky-500/10 text-sky-600 dark:text-sky-400 font-semibold' : ''}">
        <i data-lucide="${item.icon}" class="w-5 h-5"></i>
        <span>${item.label}</span>
      </button>
    `).join('');

    const mobileNavItems = menus[currentRole].slice(0, 5).map(item => `
      <button data-nav="${item.id}" onclick="navigate('${item.id}')" class="bottom-nav-item flex flex-col items-center gap-1 px-3 py-2 rounded-xl ${currentRoute === item.id ? 'active text-sky-600 dark:text-sky-400' : 'text-slate-500'}" type="button">
        <i data-lucide="${item.icon}" class="w-5 h-5"></i>
        <span class="text-[10px] font-medium">${item.label}</span>
      </button>
    `).join('');

    $('#app').innerHTML = `
      <div class="flex h-screen overflow-hidden">
        <!-- Sidebar Desktop & Mobile -->
        <aside id="sidebar" class="fixed md:relative w-64 flex flex-col glass border-r border-[rgb(var(--border))] z-[50] -translate-x-full md:translate-x-0">
          <div class="h-16 px-4 border-b border-[rgb(var(--border))] flex items-center justify-between">
            <div class="flex items-center gap-3">
              ${companySettings.logo ? `<img src="${companySettings.logo}" class="w-9 h-9 rounded-xl object-cover">` : `<div class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-500 to-indigo-600 flex items-center justify-center"><span class="text-white font-bold">O</span></div>`}
              <div>
                <h2 class="font-bold text-base">${companySettings.companyName || 'OwnsBill'}</h2>
                <p class="text-[10px] text-slate-500 uppercase">${currentRole}</p>
              </div>
            </div>
            <button onclick="closeSidebar()" class="md:hidden p-2 rounded-xl hover:bg-[rgb(var(--border))]" type="button">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>
          <nav class="flex-1 p-3 space-y-1 overflow-y-auto">${sidebarItems}</nav>
          <div class="p-3 border-t border-[rgb(var(--border))]">
            <button onclick="window.showProfileMenu()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-[rgb(var(--border))] transition" type="button">
              <img src="${currentUserData?.photo || `https://ui-avatars.com/api/?name=${currentUserData?.name}&background=0ea5e9&color=fff`}" class="w-8 h-8 rounded-full">
              <div class="flex-1 text-left">
                <p class="text-sm font-medium truncate">${currentUserData?.name}</p>
                <p class="text-xs text-slate-500 truncate">${currentUser?.email}</p>
              </div>
              <i data-lucide="chevron-up" class="w-4 h-4"></i>
            </button>
          </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden main-wrapper">
          <!-- Header -->
          <header class="fixed md:relative top-0 left-0 right-0 glass border-b border-[rgb(var(--border))] px-4 md:px-6 h-16 flex items-center no-print z-40 md:z-30">
            <div class="flex items-center justify-between gap-4 w-full">
              <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-xl hover:bg-[rgb(var(--border))]" type="button">
                  <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <h1 id="page-title" class="text-lg md:text-xl font-bold truncate"></h1>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="toggleCommandPalette(true)" class="hidden md:flex items-center gap-2 px-4 py-2 rounded-xl border border-[rgb(var(--border))] hover:bg-[rgb(var(--border))] text-sm" type="button">
                  <i data-lucide="search" class="w-4 h-4"></i>
                  <span class="text-slate-500">Search</span>

    const commands = {
      admin: [
        { label: 'Dashboard', action: () => navigate('dashboard'), icon: 'layout-dashboard' },
        { label: 'Add Customer', action: () => showCustomerForm(), icon: 'user-plus' },
        { label: 'Add Staff', action: () => showStaffForm(), icon: 'user-cog' },
        { label: 'Create Invoice', action: () => navigate('invoice'), icon: 'file-text' },
        { label: 'View Reports', action: () => navigate('reports'), icon: 'bar-chart-3' },
        { label: 'Settings', action: () => navigate('settings'), icon: 'settings' }
      ],
      staff: [
        { label: 'Dashboard', action: () => navigate('dashboard'), icon: 'layout-dashboard' },
        { label: 'My Customers', action: () => navigate('mycustomers'), icon: 'users' },
        { label: 'Create Invoice', action: () => navigate('invoice'), icon: 'file-text' },
        { label: 'View Bills', action: () => navigate('bills'), icon: 'receipt' }
      ],
      customer: [
        { label: 'Dashboard', action: () => navigate('dashboard'), icon: 'layout-dashboard' },
        { label: 'My Bills', action: () => navigate('mybills'), icon: 'receipt' },
        { label: 'Submit Complaint', action: () => showComplaintForm(), icon: 'message-circle-warning' },
        { label: 'Chat Support', action: () => navigate('chat'), icon: 'messages-square' }
      ]
    };

    const cmdResults = $('#cmd-results');
    const renderCommands = (filter = '') => {
      const list = commands[currentRole].filter(c => c.label.toLowerCase().includes(filter.toLowerCase()));
      cmdResults.innerHTML = list.map((cmd, i) => `
        <button onclick="(${cmd.action})(); toggleCommandPalette(false)" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-[rgb(var(--border))] text-left ${i===0?'bg-[rgb(var(--border))]':''}" type="button">
          <i data-lucide="${cmd.icon}" class="w-5 h-5 text-sky-600"></i>
          <span class="font-medium">${cmd.label}</span>
        </button>
      `).join('') || '<div class="p-4 text-center text-slate-500 text-sm">No results</div>';
      lucide.createIcons();
    };

    renderCommands();
    $('#cmd-search')?.addEventListener('input', (e) => renderCommands(e.target.value));
  };

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      toggleCommandPalette();
    }
    if (e.key === 'Escape') {
      toggleCommandPalette(false);
      closeModal();
      if (sidebarOpen && window.innerWidth < 768) closeSidebar();
    }
  });

  // PWA
  if ('serviceWorker' in navigator) {
    const swCode = `
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => e.waitUntil(clients.claim()));
      self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(console.error);
  }

  // Expose functions
  window.appState = appState;
  window.showInvoicePreview = showInvoicePreview;
</script>

</body>
