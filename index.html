  .fade-in { animation: fadeIn 0.3s ease-out; }

  @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(var(--primary), 0.5); border-radius: 3px; }
  
  .view-section {
    display: block !important;
    opacity: 1 !important;
    height: auto !important;
    min-height: 200px;
  }
  .view-section.hidden {
    display: none !important;
    opacity: 0 !important;
    height: 0 !important;
    overflow: hidden !important;
  }
  
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    color: rgb(var(--text), 0.5);
  }
  .loading-state i { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  
  #sidebar { 
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    top: 0;
    height: 100vh;
  }
  #sidebar-overlay {
    transition: opacity 0.3s ease-out;
    backdrop-filter: blur(4px);
  }
  
  .table-container {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  
  .main-wrapper {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  
  #content {
    flex: 1 1 auto;
  }

  .profile-dropdown {
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    min-width: 240px;
    z-index: 60;
  }

  #view-dashboard {
    padding-top: 16px;
  }

  @media (min-width: 768px) {
    .main-wrapper {
      padding-top: var(--header-h);
    }
    #view-dashboard {
      padding-top: 0;
    }
    #footer-desktop {
      position: relative;
      margin-top: auto;
    }
    .mobile-only { display: none !important; }
  }
  
  @media (max-width: 767px) {
    .table-container table { min-width: 600px; }
    #content {
      padding-bottom: calc(var(--bottom-nav-h) + var(--footer-h) + 16px);
      padding-top: var(--header-h);
    }
    #view-dashboard {
      padding-top: 16px;
    }
    #footer-mobile {
      position: fixed;
      bottom: var(--bottom-nav-h);
      left: 0;
      right: 0;
      z-index: 20;
    }
    .desktop-only { display: none !important; }
  }
  
  @media print {
    body * { visibility: hidden; }
    .print-area, .print-area * { visibility: visible; }
    .print-area { position: absolute; left: 0; top: 0; width: 100%; }
    .print-a4 { width: 210mm; padding: 15mm; }
    .print-thermal { width: 58mm; padding: 2mm; font-size: 12px; }
    .no-print { display: none !important; }
  }
  
  .bottom-nav-item {
    transition: all 0.2s;
  }
  .bottom-nav-item.active {
    color: rgb(var(--primary));
    transform: translateY(-2px);
  }

  .dashboard-grid {
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 1rem;
    height: 100%;
  }

  @media (max-width: 640px) {
    .dashboard-grid {
      grid-template-rows: auto auto auto;
      height: auto;
    }

    display: inline-flex;
    align-items: center;
    padding: 0.25rem 0.625rem;
    border-radius: 9999px;
    font-size: 0.75rem;

    font-size: 0.875rem;
    font-weight: 600;

  .lang-btn.active {
    background: rgb(var(--primary));
    color: white;
  }

    if (!ts) return null;

      if (ts?.toDate && typeof ts.toDate === 'function') return ts.toDate();
      if (ts instanceof Date) return ts;
      if (typeof ts === 'string' || typeof ts === 'number') {
        const d = new Date(ts);
        return isNaN(d.getTime()) ? null : d;
      }
      return null;

    const staffList = appState.users.filter(u => u.role === 'staff' && u.status === 'approved');

    const today = new Date();
    today.setHours(0,0,0,0);
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
    
    const todayBills = bills.filter(b => {
      const d = toDate(b.createdAt);
      return d && d >= today;
    });
    const monthBills = bills.filter(b => {
      const d = toDate(b.createdAt);
      return d && d >= monthStart;
    });
    const paidBills = bills.filter(b => b.status === 'paid');
    const unpaidBills = bills.filter(b => b.status === 'unpaid');
    const todayPromise = customers.filter(c => {
      const pd = toDate(c.promiseDate);
      return pd && pd >= today && pd < tomorrow;
    });

    const pendingDeposits = appState.staffDeposits?.filter(d => d.status === 'pending') || [];
    const pendingSalary = appState.salaryRequests?.filter(s => s.status === 'pending') || [];
    const totalPendingDeposits = pendingDeposits.reduce((sum, d) => sum + (d.amount || 0), 0);
    const totalSalaryRequests = pendingSalary.reduce((sum, s) => sum + (s.amount || 0), 0);

    const stats = currentRole === 'admin' ? [
      { label: t('totalCustomers'), value: customers.length, icon: 'users', color: 'sky' },
      { label: t('totalStaff'), value: staffList.length, icon: 'user-cog', color: 'indigo' },
      { label: t('todayCollection'), value: formatCurrency(todayBills.filter(b=>b.status==='paid').reduce((s,b)=>s+b.amount,0)), icon: 'wallet', color: 'emerald' },
      { label: t('monthlyDue'), value: formatCurrency(monthBills.filter(b=>b.status==='unpaid').reduce((s,b)=>s+b.amount,0)), icon: 'alert-circle', color: 'rose' },
      { label: t('pendingDeposits'), value: formatCurrency(totalPendingDeposits), icon: 'arrow-down-circle', color: 'amber' },
      { label: t('salaryRequests'), value: formatCurrency(totalSalaryRequests), icon: 'dollar-sign', color: 'purple' }
    ] : currentRole === 'staff' ? [
      { label: t('assignedCustomers'), value: customers.length, icon: 'users', color: 'sky' },
      { label: t('todayPromise'), value: todayPromise.length, icon: 'calendar', color: 'amber' },
      { label: t('monthPaid'), value: formatCurrency(monthBills.filter(b=>b.status==='paid').reduce((s,b)=>s+b.amount,0)), icon: 'trending-up', color: 'emerald' },
      { label: t('unpaidDue'), value: formatCurrency(unpaidBills.reduce((s,b)=>s+b.amount,0)), icon: 'alert-circle', color: 'rose' }
    ] : [
      { label: t('currentDue'), value: formatCurrency(unpaidBills.reduce((s,b)=>s+b.amount,0)), icon: 'alert-circle', color: 'rose' },
      { label: t('lastPayment'), value: paidBills[0] ? formatDate(paidBills[0].createdAt) : '-', icon: 'calendar', color: 'emerald' },
      { label: t('package'), value: currentUserData?.packageName || '-', icon: 'package', color: 'sky' },
      { label: t('speed'), value: currentUserData?.packageSpeed || '-', icon: 'zap', color: 'indigo' }
    ];

    const dashboardHTML = `
      <div class="dashboard-grid space-y-0 fade-in">
        <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-3">
          ${isLoadingData ? stats.map(() => `
            <div class="glass rounded-xl p-3 md:p-4 border border-[rgb(var(--border))]">
              <div class="skeleton h-16 rounded-lg"></div>
            </div>
          `).join('') : stats.map(s => `
            <div class="glass rounded-xl p-3 md:p-4 border border-[rgb(var(--border))] hover:shadow-lg transition">
              <div class="flex items-start justify-between">
                <div class="flex-1 min-w-0">
                  <p class="text-[10px] text-slate-500 mb-1 truncate">${s.label}</p>
                  <p class="text-lg md:text-xl font-bold truncate">${s.value}</p>
                </div>
                <div class="w-9 h-9 rounded-lg bg-${s.color}-500/20 flex items-center justify-center flex-shrink-0 ml-2">
                  <i data-lucide="${s.icon}" class="w-4 h-4 text-${s.color}-600"></i>
                </div>
              </div>
            </div>
          `).join('')}
        </div>

        ${currentRole !== 'customer' ? `
        <div class="grid lg:grid-cols-2 gap-3">
          <div class="glass rounded-xl p-3 md:p-4 border border-[rgb(var(--border))]">
            <h3 class="font-bold mb-2 flex items-center gap-2 text-sm">
              <i data-lucide="pie-chart" class="w-4 h-4 text-sky-600"></i> ${t('paymentStatus')}
            </h3>
            <div class="h-[250px] md:h-[280px]">
              <canvas id="paymentChart"></canvas>
            </div>
          </div>
          <div class="glass rounded-xl p-3 md:p-4 border border-[rgb(var(--border))]">
            <h3 class="font-bold mb-2 flex items-center gap-2 text-sm">
              <i data-lucide="bar-chart" class="w-4 h-4 text-indigo-600"></i> ${t('monthlyCollection')}
            </h3>
            <div class="h-[250px] md:h-[280px]">
              <canvas id="collectionChart"></canvas>
            </div>
          </div>
        </div>

        <div class="glass rounded-xl p-4 border border-[rgb(var(--border))] overflow-hidden">
          <h3 class="font-bold mb-3 flex items-center gap-2 text-sm">
            <i data-lucide="calendar-clock" class="w-4 h-4 text-amber-600"></i> ${t('promiseToday')} (${todayPromise.length})
          </h3>
          <div class="space-y-2 overflow-y-auto max-h-[200px]">
            ${isLoadingData ? '<div class="loading-state"><i data-lucide="loader-2" class="w-5 h-5"></i><span class="ml-2">Loading...</span></div>' : todayPromise.length ? todayPromise.map(c => `
              <div class="flex items-center justify-between p-2.5 rounded-lg bg-[rgb(var(--border))] hover:bg-[rgb(var(--border))]/70">
                <div class="flex-1 min-w-0">
                  <p class="font-semibold text-sm truncate">${c.name}</p>
                  <p class="text-xs text-slate-500 truncate">${c.mobile} • ${c.area}</p>
                </div>
                <button onclick="sendWhatsApp('${c.whatsapp}','Payment reminder for ${c.name}')" class="p-2 rounded-lg bg-emerald-500/20 text-emerald-600 hover:bg-emerald-500/30 flex-shrink-0 ml-2" type="button">
                  <i data-lucide="message-circle" class="w-4 h-4"></i>
                </button>
              </div>
            `).join('') : `<p class="text-sm text-slate-500 text-center py-6">${t('noPromiseToday')}</p>`}
          </div>
        </div>
        ` : `
        <div class="glass rounded-xl p-4 border border-[rgb(var(--border))]">
          <h3 class="font-bold mb-3 text-sm">${t('connectionDetails')}</h3>
          <div class="space-y-2">
            <div class="flex justify-between py-2 border-b border-[rgb(var(--border))]">
              <span class="text-slate-500 text-sm">${t('pppoeUser')}</span>
              <span class="font-mono font-semibold text-sm">${currentUserData?.pppoeUser || '-'}</span>

              <span class="font-semibold text-sm">${currentUserData?.packageName || '-'}</span>
            </div>
            <div class="flex justify-between py-2">
              <span class="text-slate-500 text-sm">${t('speed')}</span>
              <span class="font-semibold text-sky-600 text-sm">${currentUserData?.packageSpeed || '-'}</span>
            </div>
          </div>
        </div>`}
      </div>
    `;

    const dashboardView = document.getElementById('view-dashboard');
    if (dashboardView) {
      dashboardView.innerHTML = dashboardHTML;
    }

    if (currentRole !== 'customer') setTimeout(renderCharts, 100);
  };

  const renderCharts = () => {
    if (paymentChart) {
      paymentChart.destroy();
      paymentChart = null;
    }
    if (collectionChart) {
      collectionChart.destroy();
      collectionChart = null;
    }

    const paid = appState.bills.filter(b => b.status === 'paid').length;
    const unpaid = appState.bills.filter(b => b.status === 'unpaid').length;
    
    const paymentCanvas = $('#paymentChart');
    if (paymentCanvas && (paid > 0 || unpaid > 0)) {
      paymentChart = new Chart(paymentCanvas, {
        type: 'doughnut',
        data: {
          labels: [t('paid'), t('unpaid')],
          datasets: [{ data: [paid, unpaid], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
      });
    }

    const months = [];
    const data = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      months.push(d.toLocaleDateString(currentLang === 'bn' ? 'bn-BD' : 'en', { month: 'short' }));
      const monthStart = new Date(d.getFullYear(), d.getMonth(), 1);
      const monthEnd = new Date(d.getFullYear(), d.getMonth() + 1, 0);
      const amount = appState.bills
        .filter(b => {
          const bd = toDate(b.createdAt);
          return b.status === 'paid' && bd && bd >= monthStart && bd <= monthEnd;
        })
        .reduce((sum, b) => sum + b.amount, 0);
      data.push(amount);
    }

    const collectionCanvas = $('#collectionChart');
    if (collectionCanvas) {
      collectionChart = new Chart(collectionCanvas, {
        type: 'bar',
        data: {
          labels: months,
          datasets: [{ label: currentLang === 'bn' ? 'আদায়' : 'Collection', data, backgroundColor: '#0ea5e9', borderRadius: 6 }]
        },
        options: { 
          responsive: true, 
          maintainAspectRatio: false, 
          plugins: { 
            legend: { display: false } 
          }, 
          scales: { 
            y: { beginAtZero: true, ticks: { font: { size: 9 } } },
            x: { ticks: { font: { size: 9 } } }
          } 
        }
      });
    }
  };

  const renderCustomers = (myCustomers = false) => {
    let list = myCustomers 
      ? appState.users.filter(u => u.role === 'customer' && u.assignedStaff === currentUser.uid)
      : appState.users.filter(u => u.role === 'customer');
    
    if (currentRole === 'admin') {
      list = list.filter(u => u.status === 'approved' || !u.status);
    }

    const viewId = myCustomers ? 'view-mycustomers' : 'view-customers';
    const container = document.getElementById(viewId);
    if (!container) return;

    container.innerHTML = `

          </div>
          ${(currentRole === 'admin' || currentRole === 'staff') ? `

            <i data-lucide="user-plus" class="w-5 h-5"></i> ${t('addCustomer')}
          </button>
          ` : ''}
        </div>

        <div class="glass rounded-2xl border border-[rgb(var(--border))] overflow-hidden">
          <div class="table-container">
            <table class="w-full">
              <thead class="bg-[rgb(var(--border))] text-sm">
                <tr>
                  <th class="text-left p-4 font-semibold">${t('name')}</th>
                  <th class="text-left p-4 font-semibold">${t('contact')}</th>
                  <th class="text-left p-4 font-semibold">${t('package')}</th>
                  <th class="text-left p-4 font-semibold">${t('area')}</th>
                  <th class="text-left p-4 font-semibold">${t('due')}</th>
                  ${currentRole === 'staff' ? `<th class="text-left p-4 font-semibold">${t('status')}</th>` : ''}
                  <th class="text-right p-4 font-semibold">${t('actions')}</th>
                </tr>
              </thead>
              <tbody id="customers-tbody">
                ${isLoadingData ? '<tr><td colspan="7" class="loading-state"><i data-lucide="loader-2" class="w-5 h-5"></i><span class="ml-2">Loading customers...</span></td></tr>' : renderCustomersRows(list)}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;

    $('#search-customer')?.addEventListener('input', debounce((e) => {
      const q = e.target.value.toLowerCase();
      const filtered = list.filter(c => 
        c.name?.toLowerCase().includes(q) || 
        c.mobile?.includes(q) || 
        c.pppoeUser?.toLowerCase().includes(q) ||
        c.area?.toLowerCase().includes(q)
      );
      const tbody = $('#customers-tbody');
      if (tbody) tbody.innerHTML = renderCustomersRows(filtered);
      lucide.createIcons();
    }, 300));
  };

  const renderCustomersRows = (list) => {
    if (!list.length) return `<tr><td colspan="7" class="p-8 text-center text-slate-500">${t('noCustomersFound')}</td></tr>`;
    return list.map(c => {
      const due = appState.bills.filter(b => b.customerId === c.id && b.status === 'unpaid').reduce((s,b)=>s+b.amount,0);
      const statusBadge = currentRole === 'staff' ? `
        <td class="p-4">
          <span class="badge ${c.status === 'approved' ? 'bg-emerald-500/20 text-emerald-600' : c.status === 'pending' ? 'bg-amber-500/20 text-amber-600' : 'bg-rose-500/20 text-rose-600'}">
            ${t(c.status || 'approved')}
          </span>
        </td>

        <div class="space-y-4">
          <div><label class="text-sm font-medium mb-2 block">${t('subject')} *</label><input type="text" name="subject" required class="w-full px-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div>
          <div><label class="text-sm font-medium mb-2 block">${t('description')} *</label><textarea name="description" rows="4" required class="w-full px-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></textarea></div>
        </div>
        <div class="flex gap-3 mt-6">
          <button type="submit" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-sky-500 to-indigo-600 text-white font-semibold">${t('submit')}</button>
          <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-xl border border-[rgb(var(--border))]">${t('cancel')}</button>
        </div>
      </form>
    `);

    $('#complaint-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      try {
        await addDoc(collection(db, 'complaints'), {
          ...data,
          customerId: currentUser.uid,
          customerName: currentUserData.name,
          staffId: currentUserData.assignedStaff || null,
          status: 'pending',
          createdAt: serverTimestamp()
        });
        await logActivity('Complaint', `New complaint: ${data.subject}`);
        showToast(t('complaintSubmitted'), 'success');
        closeModal();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  };

  window.updateComplaintStatus = async (id, status) => {
    try {
      await updateDoc(doc(db, 'complaints', id), { status, updatedAt: serverTimestamp() });
      await logActivity('Complaint Update', `Status changed to ${status}`);
      showToast(t('statusUpdated'), 'success');
    } catch (err) {
      showToast(err.message, 'error');
    }
  };

  const showModal = (content) => {
    $('#modal-container').innerHTML = `
      <div class="fixed inset-0 z-[80] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4" onclick="closeModal()">
        <div class="glass rounded-3xl shadow-2xl border border-[rgb(var(--border))] w-full max-w-2xl scale-in" onclick="event.stopPropagation()">
          ${content}
        </div>
      </div>
    `;
    lucide.createIcons();
  };

  window.closeModal = () => {
    $('#modal-container').innerHTML = '';
  };

  const updateCommandPalette = () => {
    const commands = {
      admin: [
        { label: t('dashboard'), action: () => showView('dashboard'), icon: 'layout-dashboard' },
        { label: t('addCustomer'), action: () => showCustomerForm(), icon: 'user-plus' },
        { label: t('addStaff'), action: () => showStaffForm(), icon: 'user-cog' },
        { label: t('createInvoice'), action: () => showView('invoice'), icon: 'file-text' },
        { label: currentLang === 'bn' ? 'রিপোর্ট দেখুন' : 'View Reports', action: () => showView('reports'), icon: 'bar-chart-3' },
        { label: t('staffAccounts'), action: () => showView('staffaccounts'), icon: 'wallet' },
        { label: t('approvals'), action: () => showView('approvals'), icon: 'check-circle' },
        { label: t('settings'), action: () => showView('settings'), icon: 'settings' }
      ],
      staff: [
        { label: t('dashboard'), action: () => showView('dashboard'), icon: 'layout-dashboard' },
        { label: t('myCustomers'), action: () => showView('mycustomers'), icon: 'users' },
        { label: t('addCustomer'), action: () => showCustomerForm(), icon: 'user-plus' },
        { label: t('createInvoice'), action: () => showView('invoice'), icon: 'file-text' },
        { label: t('myWallet'), action: () => showView('mywallet'), icon: 'wallet' },
        { label: t('viewBills'), action: () => showView('bills'), icon: 'receipt' }
      ],
      customer: [
        { label: t('dashboard'), action: () => showView('dashboard'), icon: 'layout-dashboard' },
        { label: t('myBills'), action: () => showView('mybills'), icon: 'receipt' },
        { label: t('submitComplaint'), action: () => showComplaintForm(), icon: 'message-circle-warning' },
        { label: currentLang === 'bn' ? 'চ্যাট সাপোর্ট' : 'Chat Support', action: () => showView('chat'), icon: 'messages-square' }
      ]
    };

    const cmdResults = $('#cmd-results');
    const renderCommands = (filter = '') => {
      const list = commands[currentRole].filter(c => c.label.toLowerCase().includes(filter.toLowerCase()));
      cmdResults.innerHTML = list.map((cmd, i) => `
        <button onclick="(${cmd.action})(); toggleCommandPalette(false)" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-[rgb(var(--border))] text-left ${i===0?'bg-[rgb(var(--border))]':''}" type="button">
          <i data-lucide="${cmd.icon}" class="w-5 h-5 text-sky-600"></i>
          <span class="font-medium">${cmd.label}</span>
        </button>
      `).join('') || `<div class="p-4 text-center text-slate-500 text-sm">${currentLang === 'bn' ? 'কোনো ফলাফল নেই' : 'No results'}</div>`;
      lucide.createIcons();
    };

    renderCommands();
    $('#cmd-search')?.addEventListener('input', (e) => renderCommands(e.target.value));
  };

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      toggleCommandPalette();
    }
    if (e.key === 'Escape') {
      toggleCommandPalette(false);
      closeModal();
      if (sidebarOpen && window.innerWidth < 768) closeSidebar();
      closeMobileProfile();
    }
  });

  window.appState = appState;
  window.showInvoicePreview = showInvoicePreview;
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
