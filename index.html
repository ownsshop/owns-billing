<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISP Reseller Invoice Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600&display=swap');
  
  * { font-family: 'Inter', 'Noto Sans Bengali', sans-serif; }
  
  .invoice-paper { 
    box-shadow: 0 10px 30px -5px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.05);
  }
  
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"] { -moz-appearance: textfield; }
  
  @media print {
    body { background: white !important; }
    .no-print { display: none !important; }
    .invoice-paper { 
      box-shadow: none !important; 
      margin: 0 !important;
      max-width: 100% !important;
    }
    .print-break { page-break-inside: avoid; }
  }
  
  .fade-in {
    animation: fadeIn 0.3s ease-in;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .input-focus:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    transition: all 0.2s;
  }
</style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">
  
  <!-- Header Controls -->
  <div class="no-print bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
          <h1 class="text-2xl font-bold text-slate-800">ISP Invoice Generator</h1>
          <p class="text-sm text-slate-500 mt-0.5">ইনভয়েস তৈরি করুন / Create Professional Bills</p>
        </div>
        <div class="flex flex-wrap gap-2">
          <button onclick="saveToLocalStorage()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
            Save / সেভ
          </button>
          <button onclick="loadFromLocalStorage()" class="px-4 py-2 bg-slate-600 hover:bg-slate-700 text-white rounded-lg text-sm font-medium transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            Load / লোড
          </button>
          <button onclick="window.print()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
            Print / PDF
          </button>
          <button onclick="clearAll()" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            Clear
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
    <div class="grid lg:grid-cols-5 gap-6">
      
      <!-- Input Form -->
      <div class="lg:col-span-2 no-print">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 space-y-6">
          
          <!-- Company Details -->
          <div>
            <h3 class="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
              Company Info / কোম্পানি তথ্য
            </h3>
            <div class="space-y-3">
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-1">Company Name / কোম্পানির নাম</label>
                <input type="text" id="companyName" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" placeholder="Your ISP Name" oninput="updatePreview()">
              </div>
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-1">Logo URL / লোগো</label>
                <input type="text" id="companyLogo" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" placeholder="https://..." oninput="updatePreview()">
              </div>
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-1">Address / ঠিকানা</label>
                <textarea id="companyAddress" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" placeholder="Company Address" oninput="updatePreview()"></textarea>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="text-sm font-medium text-slate-700 block mb-1">Phone / ফোন</label>
                  <input type="text" id="companyPhone" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" placeholder="01XXXXXXXXX" oninput="updatePreview()">
                </div>
                <div>
                  <label class="text-sm font-medium text-slate-700 block mb-1">Email</label>
                  <input type="text" id="companyEmail" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" placeholder="email@isp.com" oninput="updatePreview()">
                </div>
              </div>
            </div>
          </div>

          <!-- Customer Details -->
          <div class="pt-4 border-t border-slate-200">
            <h3 class="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
              Customer Info / গ্রাহক তথ্য
            </h3>
            <div class="space-y-3">
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-1">Customer Name / নাম *</label>
                <input type="text" id="customerName" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" placeholder="Abdul Karim" oninput="updatePreview()">
              </div>
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-1">Address / ঠিকানা</label>
                <textarea id="customerAddress" rows="2" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" placeholder="House, Road, Area" oninput="updatePreview()"></textarea>
              </div>
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-1">Phone / ফোন</label>
                <input type="text" id="customerPhone" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" placeholder="01XXXXXXXXX" oninput="updatePreview()">
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="text-sm font-medium text-slate-700 block mb-1">Connection Type</label>
                  <select id="connectionType" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" oninput="updatePreview()">
                    <option value="">Select</option>
                    <option value="Fiber">Fiber / ফাইবার</option>
                    <option value="Cat5">Cat5</option>
                    <option value="Wireless">Wireless / ওয়্যারলেস</option>
                  </select>
                </div>
                <div>
                  <label class="text-sm font-medium text-slate-700 block mb-1">Package / প্যাকেজ</label>
                  <input type="text" id="packageName" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" placeholder="20 Mbps" oninput="updatePreview()">
                </div>
              </div>
            </div>
          </div>

          <!-- Invoice Details -->
          <div class="pt-4 border-t border-slate-200">
            <h3 class="text-lg font-semibold text-slate-800 mb-4 flex items-center gap-2">
              <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
              Invoice Details / বিল তথ্য
            </h3>
            <div class="space-y-3">
              <div class="grid grid-cols-3 gap-2">
                <div>
                  <label class="text-sm font-medium text-slate-700 block mb-1">Invoice #</label>
                  <input type="text" id="invoiceNumber" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" placeholder="INV-001" oninput="updatePreview()">
                </div>
                <div>
                  <label class="text-sm font-medium text-slate-700 block mb-1">Bill Month</label>
                  <input type="month" id="billMonth" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" oninput="updatePreview()">
                </div>
                <div>
                  <label class="text-sm font-medium text-slate-700 block mb-1">Due Date</label>
                  <input type="date" id="dueDate" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" oninput="updatePreview()">
                </div>
              </div>
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-1">Issue Date / ইস্যু তারিখ</label>
                <input type="date" id="issueDate" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" oninput="updatePreview()">
              </div>
            </div>
          </div>

          <!-- Items -->
          <div class="pt-4 border-t border-slate-200">
            <div class="flex justify-between items-center mb-4">
              <h3 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                Charges / চার্জ
              </h3>
              <button onclick="addItemRow()" class="text-sm bg-blue-100 text-blue-700 hover:bg-blue-200 px-3 py-1.5 rounded-lg font-medium transition">
                + Add Item
              </button>
            </div>
            <div id="itemsContainer" class="space-y-2">
              <!-- Items will be injected here -->
            </div>
            <div class="grid grid-cols-3 gap-3 mt-4">
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-1">Discount / ছাড়</label>
                <input type="number" id="discount" value="0" min="0" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" oninput="updatePreview()">
              </div>
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-1">Prev. Due / বকেয়া</label>
                <input type="number" id="previousDue" value="0" min="0" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" oninput="updatePreview()">
              </div>
              <div>
                <label class="text-sm font-medium text-slate-700 block mb-1">Total / মোট</label>
                <input type="text" id="grandTotal" readonly class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm bg-slate-50 font-bold text-slate-800">
              </div>
            </div>
          </div>

          <!-- Notes -->
          <div class="pt-4 border-t border-slate-200">
            <label class="text-sm font-medium text-slate-700 block mb-1">Notes / নোট</label>
            <textarea id="notes" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus" placeholder="Payment instructions, terms & conditions..." oninput="updatePreview()"></textarea>
          </div>

        </div>
      </div>

      <!-- Invoice Preview -->
      <div class="lg:col-span-3">
        <div id="invoicePreview" class="invoice-paper bg-white rounded-xl overflow-hidden fade-in">
          <!-- Invoice content generated by JS -->
        </div>
      </div>

    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="no-print fixed bottom-4 right-4 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
    <span id="toastMessage"></span>
  </div>

<script>
  let items = [{ id: Date.now(), description: 'Monthly Internet Bill', amount: 0 }];
  
  // Initialize
  document.addEventListener('DOMContentLoaded', function() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('issueDate').value = today;
    document.getElementById('dueDate').value = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
    document.getElementById('invoiceNumber').value = 'INV-' + String(Date.now()).slice(-6);
    
    renderItems();
    updatePreview();
    
    // Auto load if exists
    const saved = localStorage.getItem('ispInvoiceDraft');
    if (saved) showToast('Previous draft found. Click Load to restore.');
  });

  function renderItems() {
    const container = document.getElementById('itemsContainer');
    container.innerHTML = items.map((item, idx) => `
      <div class="flex gap-2 items-start">
        <div class="flex-1">
          <input type="text" 
            value="${item.description}" 
            placeholder="Item description / বিবরণ"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus"
            oninput="updateItem(${idx}, 'description', this.value)">
        </div>
        <div class="w-32">
          <input type="number" 
            value="${item.amount}" 
            min="0"
            placeholder="Amount"
            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm input-focus text-right"
            oninput="updateItem(${idx}, 'amount', parseFloat(this.value) || 0)">
        </div>
        ${items.length > 1 ? `
        <button onclick="removeItem(${idx})" class="mt-1 p-2 text-red-500 hover:bg-red-50 rounded-lg transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        ` : '<div class="w-8"></div>'}
      </div>
    `).join('');
    calculateTotal();
  }

  function updateItem(idx, field, value) {
    items[idx][field] = value;
    updatePreview();
  }

  function addItemRow() {
    items.push({ id: Date.now(), description: '', amount: 0 });
    renderItems();
    updatePreview();
  }

  function removeItem(idx) {
    if (items.length > 1) {
      items.splice(idx, 1);
      renderItems();
      updatePreview();
    }
  }

  function calculateTotal() {
    const itemsTotal = items.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
    const discount = parseFloat(document.getElementById('discount').value) || 0;
    const previousDue = parseFloat(document.getElementById('previousDue').value) || 0;
    const total = itemsTotal + previousDue - discount;
    
    document.getElementById('grandTotal').value = '৳ ' + total.toFixed(2);
    return total;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function formatMonth(monthStr) {
    if (!monthStr) return '-';
    const [year, month] = monthStr.split('-');
    const date = new Date(year, month - 1);
    return date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  }

  function updatePreview() {
    const total = calculateTotal();
    const itemsTotal = items.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
    const discount = parseFloat(document.getElementById('discount').value) || 0;
    const previousDue = parseFloat(document.getElementById('previousDue').value) || 0;
    
    const getVal = (id) => document.getElementById(id).value || '-';
    
    const logoHTML = getVal('companyLogo') !== '-' 
      ? `<img src="${getVal('companyLogo')}" alt="Logo" class="h-16 w-auto object-contain" onerror="this.style.display='none'">`
      : `<div class="h-16 w-16 bg-gradient-to-br from-blue-600 to-blue-700 rounded-lg flex items-center justify-center text-white font-bold text-xl">ISP</div>`;
    
    const itemsHTML = items.filter(i => i.description || i.amount).map(item => `
      <tr class="border-b border-slate-100">
        <td class="py-3 px-4 text-sm text-slate-700">${item.description || '-'}</td>
        <td class="py-3 px-4 text-sm text-slate-900 text-right font-medium">৳ ${(parseFloat(item.amount) || 0).toFixed(2)}</td>
      </tr>
    `).join('');
    
    document.getElementById('invoicePreview').innerHTML = `
      <div class="p-8 sm:p-10">
        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between items-start gap-6 pb-8 border-b-2 border-slate-200 print-break">
          <div class="flex items-start gap-4">
            ${logoHTML}
            <div>
              <h2 class="text-2xl font-bold text-slate-900">${getVal('companyName')}</h2>
              <p class="text-sm text-slate-600 mt-1 whitespace-pre-line">${getVal('companyAddress')}</p>
              <div class="flex flex-wrap gap-x-4 gap-y-1 mt-2 text-sm text-slate-600">
                ${getVal('companyPhone') !== '-' ? `<span>📞 ${getVal('companyPhone')}</span>` : ''}
                ${getVal('companyEmail') !== '-' ? `<span>✉️ ${getVal('companyEmail')}</span>` : ''}
              </div>
            </div>
          </div>
          <div class="text-right">
            <h1 class="text-3xl font-bold text-slate-800">INVOICE</h1>
            <p class="text-sm text-slate-500 mt-1">ইনভয়েস</p>
            <div class="mt-3 space-y-1">
              <p class="text-sm"><span class="text-slate-500">Invoice #:</span> <span class="font-semibold text-slate-900">${getVal('invoiceNumber')}</span></p>
              <p class="text-sm"><span class="text-slate-500">Issue Date:</span> <span class="font-medium">${formatDate(getVal('issueDate'))}</span></p>
            </div>
          </div>
        </div>

        <!-- Bill To & Bill Info -->
        <div class="grid sm:grid-cols-2 gap-8 py-8 print-break">
          <div>
            <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Bill To / গ্রাহক</h3>
            <div class="space-y-1">
              <p class="text-base font-semibold text-slate-900">${getVal('customerName')}</p>
              <p class="text-sm text-slate-600 whitespace-pre-line">${getVal('customerAddress')}</p>
              ${getVal('customerPhone') !== '-' ? `<p class="text-sm text-slate-600">📞 ${getVal('customerPhone')}</p>` : ''}
            </div>
          </div>
          <div>
            <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Billing Info / বিল তথ্য</h3>
            <div class="space-y-2 text-sm">
              <div class="flex justify-between">
                <span class="text-slate-600">Connection Type:</span>
                <span class="font-medium text-slate-900">${getVal('connectionType')}</span>
              </div>
              <div class="flex justify-between">
                <span class="text-slate-600">Package / প্যাকেজ:</span>
                <span class="font-medium text-slate-900">${getVal('packageName')}</span>
              </div>
              <div class="flex justify-between">
                <span class="text-slate-600">Bill Month / মাস:</span>
                <span class="font-medium text-slate-900">${formatMonth(getVal('billMonth'))}</span>
              </div>
              <div class="flex justify-between pt-2 border-t border-slate-200">
                <span class="text-red-600 font-medium">Due Date / শেষ তারিখ:</span>
                <span class="font-bold text-red-600">${formatDate(getVal('dueDate'))}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Items Table -->
        <div class="py-6 print-break">
          <table class="w-full">
            <thead>
              <tr class="border-b-2 border-slate-300 bg-slate-50">
                <th class="py-3 px-4 text-left text-xs font-semibold text-slate-700 uppercase tracking-wider">Description / বিবরণ</th>
                <th class="py-3 px-4 text-right text-xs font-semibold text-slate-700 uppercase tracking-wider w-32">Amount / টাকা</th>
              </tr>
            </thead>
            <tbody>
              ${itemsHTML || '<tr><td colspan="2" class="py-8 text-center text-slate-400 text-sm">No items added</td></tr>'}
            </tbody>
          </table>
        </div>

        <!-- Totals -->
        <div class="flex justify-end py-6 print-break">
          <div class="w-full sm:w-80 space-y-2">
            <div class="flex justify-between text-sm py-2">
              <span class="text-slate-600">Subtotal / উপমোট:</span>
              <span class="font-medium text-slate-900">৳ ${itemsTotal.toFixed(2)}</span>
            </div>
            ${previousDue > 0 ? `
            <div class="flex justify-between text-sm py-2">
              <span class="text-slate-600">Previous Due / বকেয়া:</span>
              <span class="font-medium text-orange-600">৳ ${previousDue.toFixed(2)}</span>
            </div>
            ` : ''}
            ${discount > 0 ? `
            <div class="flex justify-between text-sm py-2">
              <span class="text-slate-600">Discount / ছাড়:</span>
              <span class="font-medium text-green-600">- ৳ ${discount.toFixed(2)}</span>
            </div>
            ` : ''}
            <div class="flex justify-between text-lg font-bold py-3 border-t-2 border-slate-300">
              <span class="text-slate-900">Total Amount / সর্বমোট:</span>
              <span class="text-blue-600">৳ ${total.toFixed(2)}</span>
            </div>
          </div>
        </div>

        <!-- Notes -->
        ${getVal('notes') !== '-' ? `
        <div class="mt-8 pt-6 border-t border-slate-200 print-break">
          <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Notes / নোট</h3>
          <p class="text-sm text-slate-600 whitespace-pre-line">${getVal('notes')}</p>
        </div>
        ` : ''}

        <!-- Footer -->
        <div class="mt-12 pt-6 border-t-2 border-slate-200 text-center print-break">
          <p class="text-xs text-slate-500">Thank you for your business! / আপনার ব্যবসার জন্য ধন্যবাদ!</p>
          <p class="text-xs text-slate-400 mt-1">This is a computer generated invoice / এটি একটি কম্পিউটার জেনারেটেড ইনভয়েস</p>
        </div>
      </div>
    `;
  }

  function getFormData() {
    const data = {
      companyName: document.getElementById('companyName').value,
      companyLogo: document.getElementById('companyLogo').value,
      companyAddress: document.getElementById('companyAddress').value,
      companyPhone: document.getElementById('companyPhone').value,
      companyEmail: document.getElementById('companyEmail').value,
      customerName: document.getElementById('customerName').value,
      customerAddress: document.getElementById('customerAddress').value,
      customerPhone: document.getElementById('customerPhone').value,
      connectionType: document.getElementById('connectionType').value,
      packageName: document.getElementById('packageName').value,
      invoiceNumber: document.getElementById('invoiceNumber').value,
      billMonth: document.getElementById('billMonth').value,
      issueDate: document.getElementById('issueDate').value,
      dueDate: document.getElementById('dueDate').value,
      discount: document.getElementById('discount').value,
      previousDue: document.getElementById('previousDue').value,
      notes: document.getElementById('notes').value,
      items: items
    };
    return data;
  }

  function setFormData(data) {
    Object.keys(data).forEach(key => {
      if (key === 'items') {
        items = data.items || [{ id: Date.now(), description: 'Monthly Internet Bill', amount: 0 }];
        renderItems();
      } else {
        const el = document.getElementById(key);
        if (el) el.value = data[key];
      }
    });
    updatePreview();
  }

  function saveToLocalStorage() {
    try {
      const data = getFormData();
      localStorage.setItem('ispInvoiceDraft', JSON.stringify(data));
      localStorage.setItem('ispInvoiceCompany', JSON.stringify({
        companyName: data.companyName,
        companyLogo: data.companyLogo,
        companyAddress: data.companyAddress,
        companyPhone: data.companyPhone,
        companyEmail: data.companyEmail
      }));
      showToast('✓ Invoice saved successfully / সেভ হয়েছে');
    } catch (e) {
      showToast('✗ Error saving data', 'error');
    }
  }

  function loadFromLocalStorage() {
    try {
      const saved = localStorage.getItem('ispInvoiceDraft');
      const company = localStorage.getItem('ispInvoiceCompany');
      
      if (saved) {
        setFormData(JSON.parse(saved));
        showToast('✓ Invoice loaded / লোড হয়েছে');
      } else if (company) {
        // Load just company info for new invoice
        const companyData = JSON.parse(company);
        Object.keys(companyData).forEach(key => {
          const el = document.getElementById(key);
          if (el) el.value = companyData[key];
        });
        showToast('✓ Company info loaded');
      } else {
        showToast('✗ No saved data found', 'error');
      }
      updatePreview();
    } catch (e) {
      showToast('✗ Error loading data', 'error');
    }
  }

  function clearAll() {
    if (confirm('Are you sure you want to clear all data? / সব তথ্য মুছে ফেলবেন?')) {
      const company = localStorage.getItem('ispInvoiceCompany');
      document.querySelectorAll('input, textarea, select').forEach(el => {
        if (!['issueDate', 'dueDate', 'invoiceNumber'].includes(el.id)) el.value = '';
      });
      
      // Restore company info
      if (company) {
        const companyData = JSON.parse(company);
        Object.keys(companyData).forEach(key => {
          const el = document.getElementById(key);
          if (el) el.value = companyData[key];
        });
      }
      
      items = [{ id: Date.now(), description: 'Monthly Internet Bill', amount: 0 }];
      renderItems();
      
      document.getElementById('issueDate').value = new Date().toISOString().split('T')[0];
      document.getElementById('dueDate').value = new Date(Date.now() + 7*24*60*60*1000).toISOString().split('T')[0];
      document.getElementById('invoiceNumber').value = 'INV-' + String(Date.now()).slice(-6);
      
      updatePreview();
      showToast('✓ Cleared / ক্লিয়ার হয়েছে');
    }
  }

  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMessage');
    toastMsg.textContent = message;
    toast.className = `no-print fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 z-50 ${type === 'error' ? 'bg-red-600' : 'bg-slate-800'} text-white translate-y-0 opacity-100`;
    
    setTimeout(() => {
      toast.className = toast.className.replace('translate-y-0 opacity-100', 'translate-y-20 opacity-0');
    }, 3000);
  }

  // Auto-save every 30 seconds
  setInterval(() => {
    const data = getFormData();
    if (data.customerName || data.companyName) {
      localStorage.setItem('ispInvoiceAutoSave', JSON.stringify(data));
    }
  }, 30000);
</script>
