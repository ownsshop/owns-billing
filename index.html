<style>
  :root {
    --primary: 14, 165, 233;
    --bg: 248, 250, 252;
    --card: 255, 255, 255;
    --text: 15, 23, 42;
    --border: 226, 232, 240;
    --header-h: 64px;
    --bottom-nav-h: 64px;
    --footer-h: 40px;
  }
  .dark {
    --bg: 15, 23, 42;
    --card: 30, 41, 59;
    --text: 226, 232, 240;
    --border: 51, 65, 85;
  }
  * { touch-action: manipulation; }
  html, body { height: 100%; }
  body { 
    background: rgb(var(--bg)); 
    color: rgb(var(--text)); 
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    overscroll-behavior: none;
  }
  body.no-scroll { overflow: hidden; }
  .glass { background: rgba(var(--card), 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .skeleton { background: linear-gradient(90deg, rgba(var(--border),0.2) 25%, rgba(var(--border),0.4) 50%, rgba(var(--border),0.2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .fade-in { animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .scale-in { animation: scaleIn 0.2s ease-out; }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(var(--primary), 0.5); border-radius: 3px; }
  
  .view-section {
    display: block !important;
    opacity: 1 !important;
    height: auto !important;
    min-height: 200px;
  }
  .view-section.hidden {
    display: none !important;
    opacity: 0 !important;
    height: 0 !important;
    overflow: hidden !important;
  }
  
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    color: rgb(var(--text), 0.5);
  }
  .loading-state i { animation: spin 1s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  
  #sidebar { 
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    top: 0;
    height: 100vh;
  }
  #sidebar-overlay {
    transition: opacity 0.3s ease-out;
    backdrop-filter: blur(4px);
  }
  
  .table-container {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  
  .main-wrapper {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  
  #content {
    flex: 1 1 auto;
  }

  .profile-dropdown {
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    min-width: 240px;
    z-index: 60;
  }

  .user-dropdown {
    position: absolute;
    right: 0;
    top: calc(100% + 8px);
    min-width: 260px;
    z-index: 60;
  }

  #view-dashboard {
    padding-top: 16px;
  }

  @media (min-width: 768px) {
    .main-wrapper {
      padding-top: var(--header-h);
    }
    #view-dashboard {
      padding-top: 0;
    }
    #footer-desktop {
      position: relative;
      margin-top: auto;
    }
    .mobile-only { display: none !important; }
  }
  
  @media (max-width: 767px) {
    .table-container table { min-width: 600px; }
    #content {
      padding-bottom: calc(var(--bottom-nav-h) + var(--footer-h) + 16px);
      padding-top: var(--header-h);
    }
    #view-dashboard {
      padding-top: 16px;
    }
    #footer-mobile {
      position: fixed;
      bottom: var(--bottom-nav-h);
      left: 0;
      right: 0;
      z-index: 20;
    }
    .desktop-only { display: none !important; }
  }
  
  @media print {
    body * { visibility: hidden; }
    .print-area, .print-area * { visibility: visible; }
    .print-area { position: absolute; left: 0; top: 0; width: 100%; }
    .print-a4 { width: 210mm; padding: 15mm; }
    .print-thermal { width: 58mm; padding: 2mm; font-size: 12px; }
    .no-print { display: none !important; }
  }
  
  .bottom-nav-item {
    transition: all 0.2s;
  }
  .bottom-nav-item.active {
    color: rgb(var(--primary));
    transform: translateY(-2px);
  }

  .dashboard-grid {
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 1rem;
    height: 100%;
  }

  @media (max-width: 640px) {
    .dashboard-grid {
      grid-template-rows: auto auto auto;
      height: auto;
    }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 0.25rem 0.625rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .auth-loading {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: rgb(var(--bg));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
  }
  .auth-loading.hidden {
    display: none;
  }

  .btn-loading {
    position: relative;
    pointer-events: none;
    opacity: 0.7;
  }
  .btn-loading i {
    animation: spin 1s linear infinite;
  }

  .modal-content {
    max-height: 90vh;
    overflow-y: auto;
  }
</style>

<style id="pc-sidebar-scroll-fix">
  /* PC Only: md breakpoint 768px+ */
  @media (min-width: 768px) {
    /* Make sidebar a flex column */
    aside, nav.sidebar, #sidebar {
      display: flex !important;
      flex-direction: column !important;
      height: 100vh !important;
    }
    
    /* The menu list - usually first nav or ul after logo */
    aside > nav:first-of-type,
    aside > ul:first-of-type,
    aside > div > nav,
    #sidebar nav {
      flex: 1 1 auto !important;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      min-height: 0 !important;
    }
    
    /* Keep the last child - profile section - fixed at bottom */
    aside > div:last-child {
      flex-shrink: 0 !important;
    }
    
    /* Scrollbar style for PC */
    aside nav::-webkit-scrollbar {
      width: 6px;
    }
    aside nav::-webkit-scrollbar-track {
      background: transparent;
    }
    aside nav::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 3px;
    }
    aside nav::-webkit-scrollbar-thumb:hover {
      background: #6b7280;
    }
  }
</style>

</head>

<div id="sidebar-overlay" class="fixed inset-0 z-[45] bg-black/50 hidden opacity-0 md:hidden"></div>
<div id="toast-container" class="fixed top-4 right-4 z-[100] space-y-2 px-4 md:px-0"></div>
<div id="command-palette" class="fixed inset-0 z-[90] bg-black/50 backdrop-blur-sm hidden items-start justify-center pt-[10vh]" onclick="window.toggleCommandPalette(false)">
  <div class="w-full max-w-2xl mx-4 glass rounded-2xl shadow-2xl border border-[rgb(var(--border))] scale-in" onclick="event.stopPropagation()">
    <div class="p-4 border-b border-[rgb(var(--border))] flex items-center gap-3">
      <i data-lucide="search" class="w-5 h-5 text-[rgb(var(--primary))]"></i>
      <input id="cmd-search" type="text" placeholder="Type a command or search..." class="flex-1 bg-transparent outline-none text-sm">
      <kbd class="text-xs px-2 py-1 rounded bg-[rgb(var(--border))]">ESC</kbd>
    </div>
    <div id="cmd-results" class="max-h-80 overflow-y-auto p-2"></div>
  </div>
</div>
<div id="modal-container"></div>

<script type="module">
  import { initializeApp, deleteApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, deleteUser } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, collection, query, where, orderBy, onSnapshot, serverTimestamp, Timestamp, limit } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBZUlhoH3pPZWBmBZko-SfIJpV6jBoefRM",
    authDomain: "owns-billing.firebaseapp.com",
    projectId: "owns-billing",
    storageBucket: "owns-billing.firebasestorage.app",
    messagingSenderId: "1036958677443",
    appId: "1:1036958677443:web:5541baa54edc6e5f582576"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let secondaryApp = null;
  let secondaryAuth = null;

  const initSecondaryAuth = () => {
    if (!secondaryApp) {
      secondaryApp = initializeApp(firebaseConfig, 'secondary');
      secondaryAuth = getAuth(secondaryApp);
    }
    return secondaryAuth;
  };

  let currentUser = null;
  let currentRole = null;
  let currentUserData = null;
  let companySettings = {};
  let darkMode = localStorage.getItem('theme') === 'dark';
  let sidebarOpen = false;
  let touchStartX = 0;
  let touchEndX = 0;
  let mobileProfileOpen = false;
  let userDropdownOpen = false;
  let isLoadingData = true;
  let authInitialized = false;
  
  let paymentChart = null;
  let collectionChart = null;
  
  const appState = {
    users: [],
    customers: [],
    packages: [],
    bills: [],
    activities: [],
    zones: [],
    areas: [],
    chats: [],
    staffDeposits: [],
    salaryRequests: [],
    unsubscribers: []
  };

  const menuNames = {
    dashboard: 'Dashboard', customers: 'Customers', staff: 'Staff', packages: 'Packages',
    bills: 'Bills', invoice: 'Invoice Generator', reports: 'Reports',
    activities: 'Activity Log', settings: 'Settings', mycustomers: 'My Customers',
    mybills: 'My Bills', profile: 'Profile', chat: 'Chat', approvals: 'Approvals',
    mywallet: 'My Wallet', staffaccounts: 'Staff Accounts'
  };

  const applyTheme = () => {
    document.documentElement.classList.toggle('dark', darkMode);
    document.querySelector('meta[name="theme-color"]').setAttribute('content', darkMode ? '#1e293b' : '#0ea5e9');
    localStorage.setItem('theme', darkMode ? 'dark' : 'light');
  };
  applyTheme();

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);
  
  const toDate = (ts) => {
    if (!ts) return null;
    try {
      if (ts?.toDate && typeof ts.toDate === 'function') return ts.toDate();
      if (ts instanceof Date) return ts;
      if (typeof ts === 'string' || typeof ts === 'number') {
        const d = new Date(ts);
        return isNaN(d.getTime()) ? null : d;
      }
      return null;
    } catch (e) {
      return null;
    }
  };
  
  const formatCurrency = (num) => `৳${Number(num || 0).toLocaleString('en-IN')}`;
  const formatDate = (ts) => {
    const d = toDate(ts);
    if (!d) return '-';
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  };
  const formatDateTime = (ts) => {
    const d = toDate(ts);
    if (!d) return '-';
    return d.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  };
  const debounce = (fn, delay) => {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn(...args), delay);
    };
  };

  const showAuthLoading = (show) => {
    const el = $('#auth-loading');
    if (el) el.classList.toggle('hidden', !show);
  };

  window.showToast = (msg, type = 'info') => {
    const colors = { success: 'bg-emerald-500', error: 'bg-rose-500', info: 'bg-sky-500', warning: 'bg-amber-500' };
    const icons = { success: 'check-circle', error: 'x-circle', info: 'info', warning: 'alert-triangle' };
    const toast = document.createElement('div');
    toast.className = `${colors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 fade-in min-w-[280px] max-w-[calc(100vw-2rem)]`;
    toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5 flex-shrink-0"></i><span class="flex-1 text-sm font-medium">${msg}</span>`;
    $('#toast-container').appendChild(toast);
    lucide.createIcons();
    setTimeout(() => {
      toast.classList.add('opacity-0', 'translate-y-[-10px]', 'transition-all', 'duration-300');
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  };

  const logActivity = async (action, details) => {
    try {
      await addDoc(collection(db, 'activities'), {
        userId: currentUser?.uid,
        userName: currentUserData?.name || currentUser?.email,
        role: currentRole,
        action, details,
        timestamp: serverTimestamp()
      });
    } catch (e) { console.error('Activity log error:', e); }
  };

  window.toggleTheme = () => {
    darkMode = !darkMode;
    applyTheme();
    setTimeout(() => lucide.createIcons(), 50);
    showToast(darkMode ? 'Dark mode enabled' : 'Light mode enabled', 'info');
  };

  window.toggleCommandPalette = (show) => {
    const el = $('#command-palette');
    if (show === undefined) show = el.classList.contains('hidden');
    el.classList.toggle('hidden', !show);
    el.classList.toggle('flex', show);
    if (show) setTimeout(() => $('#cmd-search')?.focus(), 50);
  };

  window.toggleSidebar = (show = null) => {
    const sidebar = $('#sidebar');
    const overlay = $('#sidebar-overlay');
    if (!sidebar || !overlay) return;
    
    if (show === null) show = !sidebarOpen;
    sidebarOpen = show;
    
    if (window.innerWidth < 768) {
      if (show) {
        sidebar.classList.remove('-translate-x-full');
        sidebar.classList.add('translate-x-0');
        overlay.classList.remove('hidden', 'opacity-0');
        overlay.classList.add('opacity-100');
        document.body.classList.add('no-scroll');
      } else {
        sidebar.classList.add('-translate-x-full');
        sidebar.classList.remove('translate-x-0');
        overlay.classList.remove('opacity-100');
        overlay.classList.add('opacity-0');
        setTimeout(() => overlay.classList.add('hidden'), 300);
        document.body.classList.remove('no-scroll');
      }
    }
  };

  window.closeSidebar = () => toggleSidebar(false);

  window.toggleMobileProfile = () => {
    mobileProfileOpen = !mobileProfileOpen;
    const dropdown = $('#mobile-profile-dropdown');
    if (dropdown) {
      dropdown.classList.toggle('hidden', !mobileProfileOpen);
    }
  };

  window.closeMobileProfile = () => {
    mobileProfileOpen = false;
    const dropdown = $('#mobile-profile-dropdown');
    if (dropdown) dropdown.classList.add('hidden');
  };

  window.toggleUserDropdown = () => {
    userDropdownOpen = !userDropdownOpen;
    const dropdown = $('#user-dropdown');
    if (dropdown) {
      dropdown.classList.toggle('hidden', !userDropdownOpen);
    }
  };

  window.closeUserDropdown = () => {
    userDropdownOpen = false;
    const dropdown = $('#user-dropdown');
    if (dropdown) dropdown.classList.add('hidden');
  };

  const safeOnSnapshot = (queryRef, callback, collectionName) => {
    try {
      return onSnapshot(queryRef, callback, (error) => {
        console.error(`Firestore listener error for ${collectionName}:`, error);
        if (error.code === 'permission-denied') {
          console.warn(`${collectionName} collection not accessible. Using empty array.`);
          callback({ docs: [] });
        } else {
          callback({ docs: [] });
        }
      });
    } catch (err) {
      console.error(`Failed to setup listener for ${collectionName}:`, err);
      callback({ docs: [] });
      return () => {};
    }
  };

  const cleanupListeners = () => {
    appState.unsubscribers.forEach(unsub => {
      try { unsub(); } catch (e) { console.warn('Unsubscribe error:', e); }
    });
    appState.unsubscribers = [];
  };

  onAuthStateChanged(auth, async (user) => {
    if (!authInitialized) {
      showAuthLoading(true);
      authInitialized = true;
    }

    cleanupListeners();
    
    if (user) {
      try {
        console.log('[Auth] User authenticated:', user.uid, user.email);
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        
        if (!userDoc.exists()) {
          console.error('[Auth] User doc not found for UID:', user.uid);
          showAuthLoading(false);
          showToast('User profile not found. Contact admin to create your account.', 'error');
          await signOut(auth);
          return;
        }
        
        const userData = userDoc.data();
        console.log('[Auth] User data:', userData);
        
        if (userData.status === 'pending') {
          showAuthLoading(false);
          showToast('Your account is pending admin approval', 'warning');
          await signOut(auth);
          return;
        }
        
        if (userData.status === 'rejected') {
          showAuthLoading(false);
          showToast('Your account has been rejected', 'error');
          await signOut(auth);
          return;
        }

        if (userData.status !== 'approved' && userData.status !== undefined && userData.role !== 'customer') {
          showAuthLoading(false);
          showToast('Account not approved. Contact admin.', 'error');
          await signOut(auth);
          return;
        }
        
        currentUser = user;
        currentUserData = { id: user.uid, ...userData };
        currentRole = currentUserData.role;
        isLoadingData = true;
        
        await loadSettings();
        await initRealtimeListeners();
        
        showAuthLoading(false);
        renderApp();
        setTimeout(() => {
          showView('dashboard');
          isLoadingData = false;
        }, 100);
        
      } catch (err) {
        console.error('Auth error:', err);
        showAuthLoading(false);
        showToast('Authentication error: ' + err.message, 'error');
        await signOut(auth);
      }
    } else {
      currentUser = null;
      currentRole = null;
      currentUserData = null;
      showAuthLoading(false);
      renderLogin();
    }
  });

  const loadSettings = async () => {
    try {
      const snap = await getDoc(doc(db, 'settings', 'company'));
      if (snap.exists()) companySettings = snap.data();
    } catch (err) {
      console.warn('Settings load error:', err);
      companySettings = {};
    }
  };

  const initRealtimeListeners = async () => {
    let usersQuery = collection(db, 'users');
    if (currentRole === 'staff') {
      usersQuery = query(usersQuery, where('assignedStaff', '==', currentUser.uid));
    } else if (currentRole === 'customer') {
      usersQuery = query(usersQuery, where('__name__', '==', currentUser.uid));
    }
    
    appState.unsubscribers.push(safeOnSnapshot(usersQuery, (snap) => {
      appState.users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log('[Listener] Users updated:', appState.users.length);
      if (!isLoadingData && ['dashboard','customers','staff','approvals','staffaccounts'].includes(currentView)) reRenderCurrentView();
    }, 'users'));

    appState.unsubscribers.push(safeOnSnapshot(collection(db, 'packages'), (snap) => {
      appState.packages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log('[Listener] Packages updated:', appState.packages.length);
      if (!isLoadingData && ['customers','packages'].includes(currentView)) reRenderCurrentView();
    }, 'packages'));

    let billsQuery = query(collection(db, 'bills'), orderBy('createdAt', 'desc'), limit(500));
    if (currentRole === 'staff') billsQuery = query(billsQuery, where('staffId', '==', currentUser.uid));
    if (currentRole === 'customer') billsQuery = query(billsQuery, where('customerId', '==', currentUser.uid));
    
    appState.unsubscribers.push(safeOnSnapshot(billsQuery, (snap) => {
      appState.bills = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log('[Listener] Bills updated:', appState.bills.length);
      if (!isLoadingData && ['dashboard','bills','reports'].includes(currentView)) reRenderCurrentView();
    }, 'bills'));

    let complaintsQuery = query(collection(db, 'complaints'), orderBy('createdAt', 'desc'));
    if (currentRole === 'staff') complaintsQuery = query(complaintsQuery, where('assignedStaffId', '==', currentUser.uid));
    if (currentRole === 'customer') complaintsQuery = query(complaintsQuery, where('customerId', '==', currentUser.uid));
    
    appState.unsubscribers.push(safeOnSnapshot(complaintsQuery, (snap) => {
      appState.complaints = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!isLoadingData && currentView === 'complaints') reRenderCurrentView();
    }, 'complaints'));

    appState.unsubscribers.push(safeOnSnapshot(collection(db, 'zones'), (snap) => {
      appState.zones = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }, 'zones'));

    appState.unsubscribers.push(safeOnSnapshot(collection(db, 'areas'), (snap) => {
      appState.areas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }, 'areas'));

    let depositsQuery = query(collection(db, 'staff_deposits'), orderBy('date', 'desc'));
    if (currentRole === 'staff') depositsQuery = query(depositsQuery, where('staffId', '==', currentUser.uid));
    
    appState.unsubscribers.push(safeOnSnapshot(depositsQuery, (snap) => {
      appState.staffDeposits = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!isLoadingData && ['dashboard','mywallet','staffaccounts'].includes(currentView)) reRenderCurrentView();
    }, 'staff_deposits'));

    let salaryQuery = query(collection(db, 'salary_requests'), orderBy('requestDate', 'desc'));
    if (currentRole === 'staff') salaryQuery = query(salaryQuery, where('staffId', '==', currentUser.uid));
    
    appState.unsubscribers.push(safeOnSnapshot(salaryQuery, (snap) => {
      appState.salaryRequests = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!isLoadingData && ['dashboard','mywallet','staffaccounts'].includes(currentView)) reRenderCurrentView();
    }, 'salary_requests'));

    if (currentRole === 'admin') {
      appState.unsubscribers.push(safeOnSnapshot(query(collection(db, 'activities'), orderBy('timestamp', 'desc'), limit(100)), (snap) => {
        appState.activities = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (!isLoadingData && currentView === 'activities') reRenderCurrentView();
      }, 'activities'));
    }
  };

  let currentView = 'dashboard';
  const showView = (viewId) => {
    const allViews = document.querySelectorAll('.view-section');
    allViews.forEach(view => view.classList.add('hidden'));
    
    const targetView = document.getElementById(`view-${viewId}`);
    if (!targetView) return;
    targetView.classList.remove('hidden');
    
    currentView = viewId;
    
    const titleEl = document.getElementById('page-title');
    if (titleEl) titleEl.textContent = menuNames[viewId] || 'Dashboard';
    
    reRenderCurrentView();
    updateBottomNavActive();
    updateSidebarActive();
    closeMobileProfile();
    closeUserDropdown();
    
    if (window.innerWidth < 768 && sidebarOpen) closeSidebar();
  };

  window.showView = showView;

  const reRenderCurrentView = () => {
    const renderBills = (isMyBills = false) => {
    const container = document.getElementById(isMyBills ? 'view-mybills' : 'view-bills');
    if (!container) return;

    // CRITICAL: Role detection
    const isCustomerView = currentRole === 'customer' || isMyBills;
    const isStaffView = currentRole === 'staff' && !isMyBills;
    const isAdminView = currentRole === 'admin' && !isMyBills;
    
    let list = appState.bills || [];
    
    // FILTER BY ROLE FIRST
    if (isCustomerView) {
      list = list.filter(b => b.customerId === currentUser.uid);
      console.log('[Bills] CUSTOMER VIEW - Bills:', list.length);
    } else if (isStaffView) {
      const myCustomerIds = appState.users.filter(u => u.assignedStaff === currentUser.uid).map(u => u.id);
      list = list.filter(b => myCustomerIds.includes(b.customerId));
      console.log('[Bills] STAFF VIEW - My Customers:', myCustomerIds.length, 'Bills:', list.length);
    }
    
    // Apply month filter
    const monthFilter = document.getElementById('billsFilterMonth')?.value;
    if (monthFilter) {
      list = list.filter(b => {
        if (!b.createdAt?.toDate) return false;
        const d = b.createdAt.toDate();
        const [y, m] = monthFilter.split('-');
        return d.getFullYear() == y && (d.getMonth() + 1) == parseInt(m);
      });
    }

    // CUSTOMER VIEW: ONLY Search + Month + Print
    if (isCustomerView) {
      container.innerHTML = `
        <div class="space-y-4 fade-in">
          <div class="flex flex-wrap gap-3 items-center">
            <div class="relative flex-1 min-w-[200px]">
              <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
              <input id="search-bill" type="text" placeholder="বিল সার্চ করুন..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]">
            </div>
            
<div class="flex gap-2 mb-4">
    <select id="billMonth" class="px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg">
        <option value="">মাস সিলেক্ট করুন</option>
        <option value="1">জানুয়ারি</option>
        <option value="2">ফেব্রুয়ারি</option>
        <option value="3">মার্চ</option>
        <option value="4">এপ্রিল</option>
        <option value="5">মে</option>
        <option value="6">জুন</option>
        <option value="7">জুলাই</option>
        <option value="8">আগস্ট</option>
        <option value="9">সেপ্টেম্বর</option>
        <option value="10">অক্টোবর</option>
        <option value="11">নভেম্বর</option>
        <option value="12">ডিসেম্বর</option>
    </select>
    <select id="billYear" class="px-4 py-2 bg-slate-800 border border-slate-700 rounded-lg">
        <option value="2024">২০২৪</option>
        <option value="2025">২০২৫</option>
        <option value="2026" selected>২০২৬</option>
    </select>
    <button onclick="filterCustomerBills()" class="px-4 py-2 bg-blue-600 rounded-lg">সার্চ</button>
    <button onclick="printCustomerBills()" class="px-4 py-2 bg-slate-700 rounded-lg">প্রিন্ট</button>
</div>

            <button id="billsPrintMonthly" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium flex items-center gap-2">
              <i data-lucide="printer" class="w-4 h-4"></i> Print
            </button>
          </div>
          <div class="glass rounded-2xl overflow-hidden border border-[rgb(var(--border))]">
            <div class="overflow-x-auto">
              <table class="w-full">
                <thead class="bg-[rgb(var(--border))]">
                  <tr>
                    <th class="text-left p-4 font-semibold">ইনভয়েস নং</th>
                    <th class="text-left p-4 font-semibold">টাকা</th>
                    <th class="text-left p-4 font-semibold">পেমেন্ট মাধ্যম</th>
                    <th class="text-left p-4 font-semibold">স্ট্যাটাস</th>
                    <th class="text-left p-4 font-semibold">তারিখ</th>
                    <th class="text-left p-4 font-semibold">অ্যাকশন</th>
                  </tr>
                </thead>
                <tbody>
                  ${list.length ? list.map(b => `
                    <tr class="border-t border-[rgb(var(--border))] hover:bg-[rgb(var(--border))]/50">
                      <td class="p-4 font-medium">${b.invoiceId || '-'}</td>
                      <td class="p-4 text-sky-600 font-bold">${formatCurrency(b.amount)}</td>
                      <td class="p-4">${b.method || '-'}</td>
                      <td class="p-4"><span class="px-2 py-1 rounded-lg text-xs font-semibold ${b.status === 'paid' ? 'bg-emerald-500/20 text-emerald-600' : 'bg-rose-500/20 text-rose-600'}">${b.status}</span></td>
                      <td class="p-4">${b.createdAt?.toDate ? b.createdAt.toDate().toLocaleDateString('en-GB') : '-'}</td>
                      <td class="p-4">
                        <button onclick="viewBillDetails('${b.id}')" class="p-2 rounded-lg hover:bg-[rgb(var(--border))]" type="button"><i data-lucide="eye" class="w-4 h-4"></i></button>
                        ${b.status === 'unpaid' ? `<button onclick="payBill('${b.id}')" class="ml-2 px-3 py-1 rounded-lg bg-emerald-500/20 text-emerald-600 font-semibold text-sm" type="button">Pay</button>` : ''}
                      </td>
                    </tr>
                  `).join('') : '<tr><td colspan="6" class="p-8 text-center text-slate-500">কোন বিল পাওয়া যায়নি</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    } 
    // STAFF VIEW: NO All Staff dropdown
    else if (isStaffView) {
      container.innerHTML = `
        <div class="space-y-4 fade-in">
          <div class="flex flex-wrap gap-3 items-center">
            <div class="relative flex-1 min-w-[200px]">
              <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
              <input id="search-bill" type="text" placeholder="বিল সার্চ করুন..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]">
            </div>
            <select id="billsFilterZone" class="px-3 py-2 bg-[rgb(var(--card))] border border-[rgb(var(--border))] rounded-lg text-sm">
              <option value="">All Zones</option>
              ${(appState.zones || []).map(z => `<option value="${z.name}">${z.name}</option>`).join('')}
            </select>
            <select id="billsFilterArea" class="px-3 py-2 bg-[rgb(var(--card))] border border-[rgb(var(--border))] rounded-lg text-sm">
              <option value="">All Areas</option>

  const renderCharts = () => {
    if (paymentChart) {
      paymentChart.destroy();
      paymentChart = null;
    }
    if (collectionChart) {
      collectionChart.destroy();
      collectionChart = null;
    }

    const paid = appState.bills.filter(b => b.status === 'paid').length;
    const unpaid = appState.bills.filter(b => b.status === 'unpaid').length;
    
    const paymentCanvas = $('#paymentChart');
    if (paymentCanvas && (paid > 0 || unpaid > 0)) {
      paymentChart = new Chart(paymentCanvas, {
        type: 'doughnut',
        data: {
          labels: ['Paid', 'Unpaid'],
          datasets: [{ data: [paid, unpaid], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
      });
    }

    const months = [];
    const data = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      months.push(d.toLocaleDateString('en', { month: 'short' }));
      const monthStart = new Date(d.getFullYear(), d.getMonth(), 1);
      const monthEnd = new Date(d.getFullYear(), d.getMonth() + 1, 0);
      const amount = appState.bills
        .filter(b => {
          const bd = toDate(b.createdAt);
          return b.status === 'paid' && bd && bd >= monthStart && bd <= monthEnd;
        })
        .reduce((sum, b) => sum + b.amount, 0);
      data.push(amount);
    }

    const collectionCanvas = $('#collectionChart');
    if (collectionCanvas) {
      collectionChart = new Chart(collectionCanvas, {
        type: 'bar',
        data: {
          labels: months,
          datasets: [{ label: 'Collection', data, backgroundColor: '#0ea5e9', borderRadius: 6 }]

        options: { 
          responsive: true, 
          maintainAspectRatio: false, 
          plugins: { 
            legend: { display: false } 
          }, 
          scales: { 
            y: { beginAtZero: true, ticks: { font: { size: 9 } } },
            x: { ticks: { font: { size: 9 } } }
          } 
        }
      });
    }
  };

service cloud.firestore {

    match /settings/{docId} {

  });

<script>
// ISP Billing v13 - All Features Working
const ZONE_AREAS = {
    'K. P. Bag': ['Biler Kani', 'Kola Bagan', 'Grameen Towar', 'Shahi Mosjid', 'Talukdar Bari Road', 'Pathan Bari', 'Hazi Bari', 'Bot Tola'],
    'Uttara': ['Sector 1', 'Sector 3', 'Sector 7', 'Sector 10', 'Sector 12'],
    'Mirpur': ['Mirpur 1', 'Mirpur 10', 'Mirpur 12', 'Kafrul', 'Pallabi'],
    'Dhanmondi': ['Dhanmondi 27', 'Dhanmondi 32', 'Jigatola', 'Kalabagan']
};

// Wait for Firebase and DOM
firebase.auth().onAuthStateChanged(async (user) => {
    if (!user) return;
    
    // 1. Load Zones for all dropdowns
    const zoneSelects = document.querySelectorAll('#customerZoneSelect, #billsFilterZone, #areaZoneSelect');
    zoneSelects.forEach(select => {
        if (select && select.options.length <= 1) {
            Object.keys(ZONE_AREAS).forEach(zone => {
                const opt = document.createElement('option');
                opt.value = zone;
                opt.textContent = zone;
                select.appendChild(opt);
            });
        }
    });
    
    // 2. Zone -> Area Cascade for Add Customer
    const customerZone = document.getElementById('customerZoneSelect');
    const customerArea = document.getElementById('customerAreaSelect');
    
    if (customerZone && customerArea) {
        customerZone.addEventListener('change', function() {
            const zone = this.value;
            customerArea.innerHTML = '<option value="">Select Area</option>';
            
            if (zone && ZONE_AREAS[zone]) {
                customerArea.disabled = false;
                ZONE_AREAS[zone].forEach(area => {
                    const opt = document.createElement('option');
                    opt.value = area;
                    opt.textContent = area;
                    customerArea.appendChild(opt);
                });
            } else {
                customerArea.disabled = true;
            }
        });
    }
    
    // 3. Invoice Generator - Auto-fill Package
    const invoiceCustomer = document.getElementById('invoiceCustomer') || document.querySelector('select[name="customer"]');
    const invoicePackage = document.getElementById('invoicePackageField');
    const invoiceAmount = document.getElementById('invoiceAmount');
    const invoiceDueDate = document.getElementById('invoiceDueDateField');
    
    if (invoiceCustomer) {
        invoiceCustomer.addEventListener('change', async function() {
            const customerId = this.value;
            if (!customerId) return;
            
            try {
                const doc = await firebase.firestore().collection('customers').doc(customerId).get();
                if (doc.exists) {
                    const data = doc.data();
                    
                    // Fill package
                    if (invoicePackage && data.package) {
                        invoicePackage.value = data.package;
                    }
                    
                    // Fill amount from package
                    if (data.package && invoiceAmount) {
                        const pkgSnap = await firebase.firestore().collection('packages').where('name', '==', data.package).limit(1).get();
                        if (!pkgSnap.empty) {
                            invoiceAmount.value = pkgSnap.docs[0].data().price || '';
                        }
                    }
                    
                    // Set due date to next month 10th
                    if (invoiceDueDate) {
                        const nextMonth = new Date();
                        nextMonth.setMonth(nextMonth.getMonth() + 1);
                        nextMonth.setDate(10);
                        invoiceDueDate.value = nextMonth.toISOString().split('T')[0];
                    }
                }
            } catch (err) {
                console.error('Invoice auto-fill error:', err);
            }
        });
    }
    
    // 4. Bills Page Filters
    const billsFilterZone = document.getElementById('billsFilterZone');
    const billsFilterArea = document.getElementById('billsFilterArea');
    const billsFilterStaff = document.getElementById('billsFilterStaff');
    const billsFilterCustomer = document.getElementById('billsFilterCustomer');
    const billsFilterMonth = document.getElementById('billsFilterMonth');
    const billsPrintBtn = document.getElementById('billsPrintMonthly');
    
    // Zone -> Area cascade for bills filter
    if (billsFilterZone && billsFilterArea) {
        billsFilterZone.addEventListener('change', function() {
            const zone = this.value;
            billsFilterArea.innerHTML = '<option value="">All Areas</option>';
            
            if (zone && ZONE_AREAS[zone]) {
                billsFilterArea.disabled = false;
                ZONE_AREAS[zone].forEach(area => {
                    const opt = document.createElement('option');
                    opt.value = area;
                    opt.textContent = area;
                    billsFilterArea.appendChild(opt);
                });
            } else {
                billsFilterArea.disabled = true;
            }
            loadFilteredBills();
        });
    }
    
    // Load staff for filter
    if (billsFilterStaff) {
        firebase.firestore().collection('staff').get().then(snap => {
            snap.forEach(doc => {
                const opt = document.createElement('option');
                opt.value = doc.id;
                opt.textContent = doc.data().name;
                billsFilterStaff.appendChild(opt);
            });
        });
    }
    
    // Filter change events
    [billsFilterArea, billsFilterStaff, billsFilterMonth].forEach(el => {
        el?.addEventListener('change', loadFilteredBills);
    });
    billsFilterCustomer?.addEventListener('input', debounce(loadFilteredBills, 500));
    
    // Monthly Print
    if (billsPrintBtn) {
        billsPrintBtn.addEventListener('click', function() {
            const month = billsFilterMonth?.value;
            if (!month) {
                alert('Please select a month first');
                return;
            }
            // Create printable version
            const printWindow = window.open('', '_blank');
            const billsTable = document.querySelector('#billsTable')?.outerHTML || '';
            printWindow.document.write(`
                <html>
                <head><title>Monthly Bills - ${month}</title>
                <style>
                    body { font-family: Arial; padding: 20px; }
                    table { width: 100%; border-collapse: collapse; }
                    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                    th { background: #f0f0f0; }
                    h1 { text-align: center; }
                </style>
                </head>
                <body>
                    <h1>Monthly Bills Report - ${month}</h1>
                    ${billsTable}
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        });
    }
    
    // Load filtered bills function
    async function loadFilteredBills() {
        const zone = billsFilterZone?.value;
        const area = billsFilterArea?.value;
        const staff = billsFilterStaff?.value;
        const customer = billsFilterCustomer?.value.toLowerCase();
        const month = billsFilterMonth?.value;
        
        let query = firebase.firestore().collection('bills');
        
        if (zone) query = query.where('zone', '==', zone);
        if (area) query = query.where('area', '==', area);
        if (staff) query = query.where('staffId', '==', staff);
        
        if (month) {
            const start = new Date(month + '-01');
            const end = new Date(start.getFullYear(), start.getMonth() + 1, 0, 23, 59, 59);
            query = query.where('date', '>=', start).where('date', '<=', end);
        }
        
        try {
            const snap = await query.get();
            let bills = [];
            snap.forEach(doc => bills.push({id: doc.id, ...doc.data()}));
            
            if (customer) {
                bills = bills.filter(b => 
                    b.customerName?.toLowerCase().includes(customer) || 
                    b.customerMobile?.includes(customer)
                );
            }
            
            // Call your existing render function
            if (typeof renderBillsTable === 'function') {
                renderBillsTable(bills);
            } else {
                console.log('Filtered bills:', bills);
            }
        } catch (err) {
            console.error('Bills filter error:', err);
        }
    }
    
    // Helper
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }
});
