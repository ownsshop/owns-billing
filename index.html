<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwnsBilling v2.0 - ISP Billing Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; }
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        @media print { .no-print { display: none !important; } }
        .thermal-58mm { width: 58mm; font-size: 12px; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    
    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass border border-gray-200 rounded-2xl p-8 w-full max-w-md">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-blue-600">OwnsBilling</h1>
                <p class="text-gray-600 mt-2">ISP Reseller Billing Pro v2.0</p>
            </div>
            <input id="email" type="email" placeholder="ইমেইল" class="w-full p-3 mb-4 border rounded-lg">
            <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full p-3 mb-4 border rounded-lg">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold">লগিন</button>
            <p id="loginError" class="text-red-500 text-sm mt-3 text-center"></p>
        </div>
    </div>

    <!-- Main App - Hidden Initially -->
    <div id="mainApp" class="hidden">
        <!-- Header -->
        <header class="no-print bg-white dark:bg-gray-800 shadow-sm p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">OwnsBilling</h1>
            <div class="flex items-center gap-4">
                <span id="userName" class="font-medium"></span>
                <button onclick="logout()" class="text-red-500">লগআউট</button>
            </div>
        </header>

        <!-- Content -->
        <main class="p-4">
            <div id="dashboardContent">
                <h2 class="text-2xl font-bold mb-4">ড্যাসবোর্ড</h2>
                <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>
                <div id="promiseSection" class="bg-white dark:bg-gray-800 p-4 rounded-lg">
                    <h3 class="font-bold mb-3">আজকের প্রমিজ</h3>
                    <div id="promiseList"></div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="no-print text-center p-4 text-sm text-gray-500 border-t">
            Copyright © 2026 OwnsBill. All rights reserved<br>
            Website Developed by: P.M.Monir
        </footer>
    </div>

<script>
// Firebase Config - আপনার দেওয়া
const firebaseConfig = {
  apiKey: "AIzaSyBZUlhoH3pPZWBmBZko-SfIJpV6jBoefRM",
  authDomain: "owns-billing.firebaseapp.com",
  projectId: "owns-billing",
  storageBucket: "owns-billing.firebasestorage.app",
  messagingSenderId: "1036958677443",
  appId: "1:1036958677443:web:5541baa54edc6e5f582576"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let userRole = null;

// Login Function
async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('loginError');
    
    try {
        const userCred = await auth.signInWithEmailAndPassword(email, password);
        const userDoc = await db.collection('users').doc(userCred.user.uid).get();
        
        if (!userDoc.exists) {
            errorEl.textContent = 'User profile not found in database. Contact admin.';
            await auth.signOut();
            return;
        }
        
        currentUser = userCred.user;
        userRole = userDoc.data().role;
        document.getElementById('userName').textContent = userDoc.data().name;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        loadDashboard();
        
    } catch (error) {
        errorEl.textContent = 'Login failed: ' + error.message;
    }
}

function logout() {
    auth.signOut();
    location.reload();
}

function loadDashboard() {
    // বস, এখানে বাকি সব ফিচার অ্যাড হবে
    document.getElementById('statsGrid').innerHTML = `
        <div class="bg-blue-100 p-4 rounded-lg">
            <p class="text-sm">টোটাল কাস্টমার</p>
            <p class="text-2xl font-bold" id="totalCustomers">0</p>
        </div>
        <div class="bg-green-100 p-4 rounded-lg">
            <p class="text-sm">মাসিক কালেকশন</p>
            <p class="text-2xl font-bold" id="totalCollection">৳0</p>
        </div>
    `;
    loadStats();
}

async function loadStats() {
    // Firestore থেকে ডাটা লোড
    const customers = await db.collection('customers').get();
    document.getElementById('totalCustomers').textContent = customers.size;
}

// Auto Login Check
auth.onAuthStateChanged(async (user) => {
    if (user) {
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (userDoc.exists) {
            currentUser = user;
            userRole = userDoc.data().role;
            document.getElementById('userName').textContent = userDoc.data().name;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            loadDashboard();
        }
    }
});
</script>

</body>
</html>
