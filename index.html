<script type="module">
  import { initializeApp, deleteApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, deleteUser } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, collection, query, where, orderBy, onSnapshot, serverTimestamp, Timestamp, limit } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBZUlhoH3pPZWBmBZko-SfIJpV6jBoefRM",
    authDomain: "owns-billing.firebaseapp.com",
    projectId: "owns-billing",
    storageBucket: "owns-billing.firebasestorage.app",
    messagingSenderId: "1036958677443",
    appId: "1:1036958677443:web:5541baa54edc6e5f582576"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  let secondaryApp = null;
  let secondaryAuth = null;

  const initSecondaryAuth = () => {
    if (!secondaryApp) {
      secondaryApp = initializeApp(firebaseConfig, 'secondary');
      secondaryAuth = getAuth(secondaryApp);
    }
    return secondaryAuth;
  };

  let currentUser = null;
  let currentRole = null;
  let currentUserData = null;
  let companySettings = {};
  let darkMode = localStorage.getItem('theme') === 'dark';
  let sidebarOpen = false;
  let touchStartX = 0;
  let touchEndX = 0;
  let mobileProfileOpen = false;
  let userDropdownOpen = false;
  let isLoadingData = true;
  let authInitialized = false;
  
  let paymentChart = null;
  let collectionChart = null;
  
  const appState = {
    users: [],
    customers: [],
    packages: [],
    bills: [],
    complaints: [],
    activities: [],
    zones: [],
    areas: [],
    chats: [],
    staffDeposits: [],
    salaryRequests: [],
    unsubscribers: []
  };

  const menuNames = {
    dashboard: 'Dashboard', customers: 'Customers', staff: 'Staff', packages: 'Packages',
    bills: 'Bills', invoice: 'Invoice Generator', complaints: 'Complaints', reports: 'Reports',
    activities: 'Activity Log', settings: 'Settings', mycustomers: 'My Customers',
    mybills: 'My Bills', profile: 'Profile', chat: 'Chat', approvals: 'Approvals',
    mywallet: 'My Wallet', staffaccounts: 'Staff Accounts'
  };

  const applyTheme = () => {
    document.documentElement.classList.toggle('dark', darkMode);
    document.querySelector('meta[name="theme-color"]').setAttribute('content', darkMode ? '#1e293b' : '#0ea5e9');
    localStorage.setItem('theme', darkMode ? 'dark' : 'light');
  };
  applyTheme();

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);
  
  const toDate = (ts) => {
    if (!ts) return null;
    try {
      if (ts?.toDate && typeof ts.toDate === 'function') return ts.toDate();
      if (ts instanceof Date) return ts;
      if (typeof ts === 'string' || typeof ts === 'number') {
        const d = new Date(ts);
        return isNaN(d.getTime()) ? null : d;
      }
      return null;
    } catch (e) {
      return null;
    }
  };
  
  const formatCurrency = (num) => `৳${Number(num || 0).toLocaleString('en-IN')}`;
  const formatDate = (ts) => {
    const d = toDate(ts);
    if (!d) return '-';
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  };
  const formatDateTime = (ts) => {
    const d = toDate(ts);
    if (!d) return '-';
    return d.toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  };
  const debounce = (fn, delay) => {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn(...args), delay);
    };
  };

  const showAuthLoading = (show) => {
    const el = $('#auth-loading');
    if (el) el.classList.toggle('hidden', !show);
  };

  window.showToast = (msg, type = 'info') => {
    const colors = { success: 'bg-emerald-500', error: 'bg-rose-500', info: 'bg-sky-500', warning: 'bg-amber-500' };
    const icons = { success: 'check-circle', error: 'x-circle', info: 'info', warning: 'alert-triangle' };
    const toast = document.createElement('div');
    toast.className = `${colors[type]} text-white px-4 py-3 rounded-xl shadow-lg flex items-center gap-3 fade-in min-w-[280px] max-w-[calc(100vw-2rem)]`;
    toast.innerHTML = `<i data-lucide="${icons[type]}" class="w-5 h-5 flex-shrink-0"></i><span class="flex-1 text-sm font-medium">${msg}</span>`;
    $('#toast-container').appendChild(toast);
    lucide.createIcons();
    setTimeout(() => {
      toast.classList.add('opacity-0', 'translate-y-[-10px]', 'transition-all', 'duration-300');
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  };

  const logActivity = async (action, details) => {
    try {
      await addDoc(collection(db, 'activities'), {
        userId: currentUser?.uid,
        userName: currentUserData?.name || currentUser?.email,
        role: currentRole,
        action, details,
        timestamp: serverTimestamp()
      });
    } catch (e) { console.error('Activity log error:', e); }
  };

  window.toggleTheme = () => {
    darkMode = !darkMode;
    applyTheme();
    setTimeout(() => lucide.createIcons(), 50);
    showToast(darkMode ? 'Dark mode enabled' : 'Light mode enabled', 'info');
  };

  window.toggleCommandPalette = (show) => {
    const el = $('#command-palette');
    if (show === undefined) show = el.classList.contains('hidden');
    el.classList.toggle('hidden', !show);
    el.classList.toggle('flex', show);
    if (show) setTimeout(() => $('#cmd-search')?.focus(), 50);
  };

  window.toggleSidebar = (show = null) => {
    const sidebar = $('#sidebar');
    const overlay = $('#sidebar-overlay');
    if (!sidebar || !overlay) return;
    
    if (show === null) show = !sidebarOpen;
    sidebarOpen = show;
    
    if (window.innerWidth < 768) {
      if (show) {
        sidebar.classList.remove('-translate-x-full');
        sidebar.classList.add('translate-x-0');
        overlay.classList.remove('hidden', 'opacity-0');
        overlay.classList.add('opacity-100');
        document.body.classList.add('no-scroll');
      } else {
        sidebar.classList.add('-translate-x-full');
        sidebar.classList.remove('translate-x-0');
        overlay.classList.remove('opacity-100');
        overlay.classList.add('opacity-0');
        setTimeout(() => overlay.classList.add('hidden'), 300);
        document.body.classList.remove('no-scroll');
      }
    }
  };

  window.closeSidebar = () => toggleSidebar(false);

  window.toggleMobileProfile = () => {
    mobileProfileOpen = !mobileProfileOpen;
    const dropdown = $('#mobile-profile-dropdown');
    if (dropdown) {
      dropdown.classList.toggle('hidden', !mobileProfileOpen);
    }
  };

  window.closeMobileProfile = () => {
    mobileProfileOpen = false;
    const dropdown = $('#mobile-profile-dropdown');
    if (dropdown) dropdown.classList.add('hidden');
  };

  window.toggleUserDropdown = () => {
    userDropdownOpen = !userDropdownOpen;
    const dropdown = $('#user-dropdown');
    if (dropdown) {
      dropdown.classList.toggle('hidden', !userDropdownOpen);
    }
  };

  window.closeUserDropdown = () => {
    userDropdownOpen = false;
    const dropdown = $('#user-dropdown');
    if (dropdown) dropdown.classList.add('hidden');
  };

  const safeOnSnapshot = (queryRef, callback, collectionName) => {
    try {
      return onSnapshot(queryRef, callback, (error) => {
        console.error(`Firestore listener error for ${collectionName}:`, error);
        if (error.code === 'permission-denied') {
          console.warn(`${collectionName} collection not accessible. Using empty array.`);
          callback({ docs: [] });
        } else {
          callback({ docs: [] });
        }
      });
    } catch (err) {
      console.error(`Failed to setup listener for ${collectionName}:`, err);
      callback({ docs: [] });
      return () => {};
    }
  };

  const cleanupListeners = () => {
    appState.unsubscribers.forEach(unsub => {
      try { unsub(); } catch (e) { console.warn('Unsubscribe error:', e); }
    });
    appState.unsubscribers = [];
  };

  onAuthStateChanged(auth, async (user) => {
    if (!authInitialized) {
      showAuthLoading(true);
      authInitialized = true;
    }

    cleanupListeners();
    
    if (user) {
      try {
        console.log('[Auth] User authenticated:', user.uid, user.email);
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        
        if (!userDoc.exists()) {
          console.error('[Auth] User doc not found for UID:', user.uid);
          showAuthLoading(false);
          showToast('User profile not found. Contact admin to create your account.', 'error');
          await signOut(auth);
          return;
        }
        
        const userData = userDoc.data();
        console.log('[Auth] User data:', userData);
        
        if (userData.status === 'pending') {
          showAuthLoading(false);
          showToast('Your account is pending admin approval', 'warning');
          await signOut(auth);
          return;
        }
        
        if (userData.status === 'rejected') {
          showAuthLoading(false);
          showToast('Your account has been rejected', 'error');
          await signOut(auth);
          return;
        }

        if (userData.status !== 'approved' && userData.status !== undefined && userData.role !== 'customer') {
          showAuthLoading(false);
          showToast('Account not approved. Contact admin.', 'error');
          await signOut(auth);
          return;
        }
        
        currentUser = user;
        currentUserData = { id: user.uid, ...userData };
        currentRole = currentUserData.role;
        isLoadingData = true;
        
        await loadSettings();
        await initRealtimeListeners();
        
        showAuthLoading(false);
        renderApp();
        setTimeout(() => {
          showView('dashboard');
          isLoadingData = false;
        }, 100);
        
      } catch (err) {
        console.error('Auth error:', err);
        showAuthLoading(false);
        showToast('Authentication error: ' + err.message, 'error');
        await signOut(auth);
      }
    } else {
      currentUser = null;
      currentRole = null;
      currentUserData = null;
      showAuthLoading(false);
      renderLogin();
    }
  });

  const loadSettings = async () => {
    try {
      const snap = await getDoc(doc(db, 'settings', 'company'));
      if (snap.exists()) companySettings = snap.data();
    } catch (err) {
      console.warn('Settings load error:', err);
      companySettings = {};
    }
  };

  const initRealtimeListeners = async () => {
    let usersQuery = collection(db, 'users');
    if (currentRole === 'staff') {
      usersQuery = query(usersQuery, where('assignedStaff', '==', currentUser.uid));
    } else if (currentRole === 'customer') {
      usersQuery = query(usersQuery, where('__name__', '==', currentUser.uid));
    }
    
    appState.unsubscribers.push(safeOnSnapshot(usersQuery, (snap) => {
      appState.users = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log('[Listener] Users updated:', appState.users.length);
      if (!isLoadingData && ['dashboard','customers','staff','approvals','staffaccounts'].includes(currentView)) reRenderCurrentView();
    }, 'users'));

    appState.unsubscribers.push(safeOnSnapshot(collection(db, 'packages'), (snap) => {
      appState.packages = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log('[Listener] Packages updated:', appState.packages.length);
      if (!isLoadingData && ['customers','packages'].includes(currentView)) reRenderCurrentView();
    }, 'packages'));

    let billsQuery = query(collection(db, 'bills'), orderBy('createdAt', 'desc'), limit(500));
    if (currentRole === 'staff') billsQuery = query(billsQuery, where('staffId', '==', currentUser.uid));
    if (currentRole === 'customer') billsQuery = query(billsQuery, where('customerId', '==', currentUser.uid));
    
    appState.unsubscribers.push(safeOnSnapshot(billsQuery, (snap) => {
      appState.bills = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      console.log('[Listener] Bills updated:', appState.bills.length);
      if (!isLoadingData && ['dashboard','bills','reports'].includes(currentView)) reRenderCurrentView();
    }, 'bills'));

    let complaintsQuery = query(collection(db, 'complaints'), orderBy('createdAt', 'desc'));
    if (currentRole === 'staff') complaintsQuery = query(complaintsQuery, where('assignedStaffId', '==', currentUser.uid));
    if (currentRole === 'customer') complaintsQuery = query(complaintsQuery, where('customerId', '==', currentUser.uid));
    
    appState.unsubscribers.push(safeOnSnapshot(complaintsQuery, (snap) => {
      appState.complaints = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (!isLoadingData && currentView === 'complaints') reRenderCurrentView();
    }, 'complaints'));

    appState.unsubscribers.push(safeOnSnapshot(collection(db, 'zones'), (snap) => {
      appState.zones = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }, 'zones'));

    appState.unsubscribers.push(safeOnSnapshot(collection(db, 'areas'), (snap) => {
      appState.areas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    }, 'areas'));

    let depositsQuery = query(collection(db, 'staff_deposits'), orderBy('date', 'desc'));
    if (currentRole === 'staff') depositsQuery = query(depositsQuery, where('staffId', '==', currentUser.uid));
    
    appState.unsubscribers.push(safeOnSnapshot(depositsQuery, (snap) => {

    const today = new Date();
    today.setHours(0,0,0,0);
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
    
    const todayBills = bills.filter(b => {
      const d = toDate(b.createdAt);
      return d && d >= today;
    });
    const monthBills = bills.filter(b => {
      const d = toDate(b.createdAt);
      return d && d >= monthStart;
    });
    const paidBills = bills.filter(b => b.status === 'paid');
    const unpaidBills = bills.filter(b => b.status === 'unpaid');
    const todayPromise = customers.filter(c => {

      return pd && pd >= today && pd < tomorrow;

    const pendingStaffCount = appState.users.filter(u => u.role === 'staff' && u.status === 'pending').length;

      { label: 'Last Payment', value: paidBills[0] ? formatDate(paidBills[0].createdAt) : '-', icon: 'calendar', color: 'emerald' },
      { label: 'Package', value: currentUserData?.packageName || '-', icon: 'package', color: 'sky' },
      { label: 'Speed', value: currentUserData?.packageSpeed || '-', icon: 'zap', color: 'indigo' }

    const dashboardHTML = `
      <div class="dashboard-grid space-y-0 fade-in">
        <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-3">

              <div class="flex items-start justify-between">

        ${currentRole === 'admin' && (pendingStaffCount > 0 || pendingCustomerCount > 0) ? `
        <div class="glass rounded-xl p-4 border border-amber-500/50 bg-amber-50 dark:bg-amber-900/20">
          <div class="flex items-center gap-3">
            <i data-lucide="alert-triangle" class="w-5 h-5 text-amber-600 flex-shrink-0"></i>
            <div class="flex-1">
              <p class="font-semibold text-sm">Pending Approvals</p>
              <p class="text-xs text-slate-600 dark:text-slate-400">
                ${pendingStaffCount > 0 ? `${pendingStaffCount} staff` : ''}
                ${pendingStaffCount > 0 && pendingCustomerCount > 0 ? ' and ' : ''}
                ${pendingCustomerCount > 0 ? `${pendingCustomerCount} customers` : ''}
                waiting for approval
              </p>
            </div>
            <button onclick="showView('approvals')" class="px-4 py-2 rounded-lg bg-amber-500 text-white text-sm font-semibold" type="button">Review</button>
          </div>
        </div>
        ` : ''}

        ${currentRole !== 'customer' ? `
        <div class="grid lg:grid-cols-2 gap-3">
          <div class="glass rounded-xl p-3 md:p-4 border border-[rgb(var(--border))]">
            <h3 class="font-bold mb-2 flex items-center gap-2 text-sm">
              <i data-lucide="pie-chart" class="w-4 h-4 text-sky-600"></i> Payment Status
            </h3>
            <div class="h-[250px] md:h-[280px]">
              <canvas id="paymentChart"></canvas>
            </div>
          </div>
          <div class="glass rounded-xl p-3 md:p-4 border border-[rgb(var(--border))]">
            <h3 class="font-bold mb-2 flex items-center gap-2 text-sm">
              <i data-lucide="bar-chart" class="w-4 h-4 text-indigo-600"></i> Monthly Collection
            </h3>
            <div class="h-[250px] md:h-[280px]">
              <canvas id="collectionChart"></canvas>
            </div>
          </div>
        </div>

        <div class="glass rounded-xl p-4 border border-[rgb(var(--border))] overflow-hidden">
          <h3 class="font-bold mb-3 flex items-center gap-2 text-sm">
            <i data-lucide="calendar-clock" class="w-4 h-4 text-amber-600"></i> Today's Promise (${todayPromise.length})
          </h3>
          <div class="space-y-2 overflow-y-auto max-h-[200px]">
            ${isLoadingData ? '<div class="loading-state"><i data-lucide="loader-2" class="w-5 h-5"></i><span class="ml-2">Loading...</span></div>' : todayPromise.length ? todayPromise.map(c => `
              <div class="flex items-center justify-between p-2.5 rounded-lg bg-[rgb(var(--border))] hover:bg-[rgb(var(--border))]/70">
                <div class="flex-1 min-w-0">
                  <p class="font-semibold text-sm truncate">${c.name}</p>
                  <p class="text-xs text-slate-500 truncate">${c.mobile} • ${c.area}</p>
                </div>
                <button onclick="sendWhatsApp('${c.whatsapp}','Payment reminder for ${c.name}')" class="p-2 rounded-lg bg-emerald-500/20 text-emerald-600 hover:bg-emerald-500/30 flex-shrink-0 ml-2" type="button">
                  <i data-lucide="message-circle" class="w-4 h-4"></i>
                </button>
              </div>
            `).join('') : '<p class="text-sm text-slate-500 text-center py-6">No promises for today</p>'}
          </div>
        </div>
        ` : `
        <div class="glass rounded-xl p-4 border border-[rgb(var(--border))]">
          <h3 class="font-bold mb-3 text-sm">Connection Details</h3>

            <div class="flex justify-between py-2 border-b border-[rgb(var(--border))]">
              <span class="text-slate-500 text-sm">Package</span>
              <span class="font-semibold text-sm">${currentUserData?.packageName || '-'}</span>
            </div>
            <div class="flex justify-between py-2">
              <span class="text-slate-500 text-sm">Speed</span>
              <span class="font-semibold text-sky-600 text-sm">${currentUserData?.packageSpeed || '-'}</span>

          </div>
        </div>`}

    `;

    const dashboardView = document.getElementById('view-dashboard');
    if (dashboardView) {
      dashboardView.innerHTML = dashboardHTML;
    }

    if (currentRole !== 'customer') setTimeout(renderCharts, 100);
  };

  const renderCharts = () => {
    if (paymentChart) {
      paymentChart.destroy();
      paymentChart = null;
    }
    if (collectionChart) {
      collectionChart.destroy();
      collectionChart = null;
    }

    const paid = appState.bills.filter(b => b.status === 'paid').length;
    const unpaid = appState.bills.filter(b => b.status === 'unpaid').length;
    
    const paymentCanvas = $('#paymentChart');
    if (paymentCanvas && (paid > 0 || unpaid > 0)) {
      paymentChart = new Chart(paymentCanvas, {
        type: 'doughnut',
        data: {
          labels: ['Paid', 'Unpaid'],
          datasets: [{ data: [paid, unpaid], backgroundColor: ['#10b981', '#f43f5e'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
      });
    }

    const months = [];
    const data = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      months.push(d.toLocaleDateString('en', { month: 'short' }));
      const monthStart = new Date(d.getFullYear(), d.getMonth(), 1);
      const monthEnd = new Date(d.getFullYear(), d.getMonth() + 1, 0);
      const amount = appState.bills
        .filter(b => {
          const bd = toDate(b.createdAt);
          return b.status === 'paid' && bd && bd >= monthStart && bd <= monthEnd;
        })
        .reduce((sum, b) => sum + b.amount, 0);
      data.push(amount);
    }

    const collectionCanvas = $('#collectionChart');
    if (collectionCanvas) {
      collectionChart = new Chart(collectionCanvas, {
        type: 'bar',
        data: {
          labels: months,
          datasets: [{ label: 'Collection', data, backgroundColor: '#0ea5e9', borderRadius: 6 }]
        },
        options: { 
          responsive: true, 
          maintainAspectRatio: false, 
          plugins: { 
            legend: { display: false } 
          }, 
          scales: { 
            y: { beginAtZero: true, ticks: { font: { size: 9 } } },
            x: { ticks: { font: { size: 9 } } }
          } 
        }
      });
    }
  };

  const renderCustomers = (myCustomers = false) => {
    let list = myCustomers 
      ? appState.users.filter(u => u.role === 'customer' && u.assignedStaff === currentUser.uid)
      : appState.users.filter(u => u.role === 'customer');
    
    if (currentRole === 'admin') {
      list = list.filter(u => u.status === 'approved' || !u.status);
    }

    const viewId = myCustomers ? 'view-mycustomers' : 'view-customers';
    const container = document.getElementById(viewId);
    if (!container) return;

    container.innerHTML = `
      <div class="space-y-4 fade-in">
        <div class="flex flex-col sm:flex-row gap-3 justify-between">
          <div class="relative flex-1">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
            <input id="search-customer" type="text" placeholder="Search customers..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))] focus:ring-2 focus:ring-sky-500 outline-none">
          </div>
          ${(currentRole === 'admin' || currentRole === 'staff') ? `
          <button onclick="showCustomerForm()" class="px-6 py-3 rounded-xl bg-gradient-to-r from-sky-500 to-indigo-600 text-white font-semibold hover:shadow-lg flex items-center gap-2 whitespace-nowrap" type="button">
            <i data-lucide="user-plus" class="w-5 h-5"></i> Add Customer
          </button>
          ` : ''}
        </div>

        <div class="glass rounded-2xl border border-[rgb(var(--border))] overflow-hidden">
          <div class="table-container">
            <table class="w-full">
              <thead class="bg-[rgb(var(--border))] text-sm">
                <tr>
                  <th class="text-left p-4 font-semibold">Name</th>
                  <th class="text-left p-4 font-semibold">Contact</th>
                  <th class="text-left p-4 font-semibold">Package</th>
                  <th class="text-left p-4 font-semibold">Area</th>
                  <th class="text-left p-4 font-semibold">Due</th>
                  ${currentRole === 'staff' ? '<th class="text-left p-4 font-semibold">Status</th>' : ''}
                  <th class="text-right p-4 font-semibold">Actions</th>
                </tr>
              </thead>
              <tbody id="customers-tbody">
                ${isLoadingData ? '<tr><td colspan="7" class="loading-state"><i data-lucide="loader-2" class="w-5 h-5"></i><span class="ml-2">Loading customers...</span></td></tr>' : renderCustomersRows(list)}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;

    $('#search-customer')?.addEventListener('input', debounce((e) => {
      const q = e.target.value.toLowerCase();
      const filtered = list.filter(c => 
        c.name?.toLowerCase().includes(q) || 
        c.mobile?.includes(q) || 
        c.pppoeUser?.toLowerCase().includes(q) ||
        c.area?.toLowerCase().includes(q)
      );
      const tbody = $('#customers-tbody');
      if (tbody) tbody.innerHTML = renderCustomersRows(filtered);
      lucide.createIcons();
    }, 300));
  };

  const renderCustomersRows = (list) => {
    if (!list.length) return `<tr><td colspan="7" class="p-8 text-center text-slate-500">No customers found</td></tr>`;
    return list.map(c => {
      const due = appState.bills.filter(b => b.customerId === c.id && b.status === 'unpaid').reduce((s,b)=>s+b.amount,0);
      const statusBadge = currentRole === 'staff' ? `
        <td class="p-4">
          <span class="badge ${c.status === 'approved' || !c.status ? 'bg-emerald-500/20 text-emerald-600' : c.status === 'pending' ? 'bg-amber-500/20 text-amber-600' : 'bg-rose-500/20 text-rose-600'}">
            ${c.status || 'approved'}
          </span>
        </td>
      ` : '';
      return `
      <tr class="border-t border-[rgb(var(--border))] hover:bg-[rgb(var(--border))]/30">
        <td class="p-4">
          <div class="font-semibold">${c.name || '-'}</div>
          <div class="text-xs text-slate-500">${c.pppoeUser || '-'}</div>
        </td>
        <td class="p-4">
          <div class="text-sm">${c.mobile || '-'}</div>
          <div class="text-xs text-slate-500">${c.whatsapp || '-'}</div>
        </td>
        <td class="p-4">
          <div class="text-sm font-medium text-sky-600">${c.packageName || '-'}</div>
          <div class="text-xs text-slate-500">${c.packageSpeed || '-'}</div>
        </td>
        <td class="p-4 text-sm">${c.area || '-'}</td>
        <td class="p-4">
          <span class="px-3 py-1 rounded-full text-xs font-semibold ${due > 0 ? 'bg-rose-500/20 text-rose-600' : 'bg-emerald-500/20 text-emerald-600'}">
            ${formatCurrency(due)}
          </span>
        </td>
        ${statusBadge}
        <td class="p-4">
          <div class="flex items-center justify-end gap-2">
            <button onclick="viewCustomer('${c.id}')" class="p-2 rounded-lg hover:bg-[rgb(var(--border))]" title="View" type="button">
              <i data-lucide="eye" class="w-4 h-4"></i>
            </button>
            ${currentRole !== 'customer' ? `
            <button onclick="createInvoiceFor('${c.id}')" class="p-2 rounded-lg hover:bg-sky-500/20 text-sky-600" title="Create Invoice" type="button">
              <i data-lucide="file-text" class="w-4 h-4"></i>
            </button>
            <button onclick="sendWhatsApp('${c.whatsapp}','Payment reminder')" class="p-2 rounded-lg hover:bg-emerald-500/20 text-emerald-600" title="WhatsApp" type="button">
              <i data-lucide="message-circle" class="w-4 h-4"></i>
            </button>
            ` : ''}
            ${(currentRole === 'admin' || (currentRole === 'staff' && c.addedBy === currentUser.uid)) ? `
            <button onclick="showCustomerForm('${c.id}')" class="p-2 rounded-lg hover:bg-[rgb(var(--border))]" title="Edit" type="button">
              <i data-lucide="edit" class="w-4 h-4"></i>
            </button>
            ` : ''}
          </div>
        </td>
      </tr>
    `}).join('');
  };

  window.showCustomerForm = (id = null) => {
    const customer = id ? appState.users.find(u => u.id === id) : null;
    const staffList = appState.users.filter(u => u.role === 'staff' && (u.status === 'approved' || !u.status));
    const areaOptions = (appState.areas || []).map(a => `<option value="${a.name}" ${customer?.area===a.name?'selected':''}>${a.name}</option>`).join('');
    const zoneOptions = (appState.zones || []).map(z => `<option value="${z.name}" ${customer?.zone===z.name?'selected':''}>${z.name}</option>`).join('');
    
    showModal(`
      <div class="modal-content p-6">
        <h3 class="text-xl font-bold mb-6">${id ? 'Edit' : 'Add'} Customer ${currentRole === 'staff' ? '(Pending Approval)' : ''}</h3>
        <form id="customer-form">
          <div class="grid md:grid-cols-2 gap-4">
            <div><label class="text-sm font-medium mb-2 block">Name *</label><input type="text" name="name" value="${customer?.name||''}" required class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div>
            <div><label class="text-sm font-medium mb-2 block">Email *</label><input type="email" name="email" value="${customer?.email||''}" required class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div>
            <div><label class="text-sm font-medium mb-2 block">Mobile *</label><input type="tel" name="mobile" value="${customer?.mobile||''}" required class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div>
            <div><label class="text-sm font-medium mb-2 block">WhatsApp *</label><input type="tel" name="whatsapp" value="${customer?.whatsapp||''}" required pattern="[0-9]{11,}" title="Valid WhatsApp number" class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div>
            <div><label class="text-sm font-medium mb-2 block">Imo</label><input type="tel" name="imo" value="${customer?.imo||''}" class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div>
            <div><label class="text-sm font-medium mb-2 block">NID</label><input type="text" name="nid" value="${customer?.nid||''}" class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div>
            <div><label class="text-sm font-medium mb-2 block">Zone *</label><select name="zone" required class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"><option value="">Select Zone</option>${zoneOptions}</select></div>
            <div><label class="text-sm font-medium mb-2 block">Area *</label><select name="area" required class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"><option value="">Select Area</option>${areaOptions}</select></div>
            <div><label class="text-sm font-medium mb-2 block">PPPoE User</label><input type="text" name="pppoeUser" value="${customer?.pppoeUser||''}" class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div>
            <div><label class="text-sm font-medium mb-2 block">PPPoE Pass</label><input type="text" name="pppoePass" value="${customer?.pppoePass||''}" class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div>
            <div><label class="text-sm font-medium mb-2 block">Package</label><select name="packageId" class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"><option value="">Select Package</option>${appState.packages.map(p=>`<option value="${p.id}" ${customer?.packageId===p.id?'selected':''}>${p.name} - ${p.speed} - ${formatCurrency(p.price)}</option>`).join('')}</select></div>
            <div><label class="text-sm font-medium mb-2 block">Assigned Staff</label><select name="assignedStaff" class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"><option value="">Select Staff</option>${staffList.map(s=>`<option value="${s.id}" ${customer?.assignedStaff===s.id?'selected':''}>${s.name}</option>`).join('')}</select></div>
            <div class="md:col-span-2"><label class="text-sm font-medium mb-2 block">Address</label><textarea name="address" rows="2" class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]">${customer?.address||''}</textarea></div>
            ${!id ? `<div class="md:col-span-2"><label class="text-sm font-medium mb-2 block">Password *</label><input type="password" name="password" required class="w-full px-4 py-2 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div>` : ''}
          </div>
          <div class="flex gap-3 mt-6">
            <button type="submit" id="customer-submit-btn" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-sky-500 to-indigo-600 text-white font-semibold">Save Customer</button>
            <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-xl border border-[rgb(var(--border))]">Cancel</button>
          </div>
        </form>
      </div>
    `);

    $('#customer-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const submitBtn = $('#customer-submit-btn');
      submitBtn.classList.add('btn-loading');
      submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 inline mr-2"></i>Saving...';
      lucide.createIcons();

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      const pkg = appState.packages.find(p => p.id === data.packageId);
      if (pkg) {
        data.packageName = pkg.name;
        data.packageSpeed = pkg.speed;
        data.packagePrice = pkg.price;
      }
      data.role = 'customer';
      data.status = currentRole === 'staff' ? 'pending' : 'approved';
      data.addedBy = currentUser.uid;
      
      let userCred = null;
      let docCreated = false;
      
      try {
        console.log('[Customer Create] Starting. Data:', data);
        if (id) {
          await updateDoc(doc(db, 'users', id), data);
          await logActivity('Update Customer', `Updated customer: ${data.name}`);
          showToast('Customer updated successfully', 'success');
        } else {
          console.log('[Customer Create] Creating auth user for:', data.email);
          const secondaryAut = initSecondaryAuth();
          userCred = await createUserWithEmailAndPassword(secondaryAut, data.email, data.password);
          console.log('[Customer Create] Auth user created:', userCred.user.uid);
          
          delete data.password;
          const userData = {
            ...data,
            createdAt: serverTimestamp()
          };
          
          console.log('[Customer Create] Creating Firestore doc');
          await setDoc(doc(db, 'users', userCred.user.uid), userData);
          docCreated = true;
          console.log('[Customer Create] Firestore doc created');
          
          await logActivity('Add Customer', `Added customer: ${data.name} (${data.status})`);
          showToast(`Customer added ${data.status === 'pending' ? 'and pending approval' : 'successfully'}`, 'success');
        }
        closeModal();
        setTimeout(() => renderCustomers(myCustomers), 500);
      } catch (err) {
        console.error('[Customer Create] Error:', err);
        if (userCred && !docCreated && secondaryAuth?.currentUser?.uid === userCred.user.uid) {
          try {
            console.log('[Customer Create] Rolling back auth user');
            await deleteUser(userCred.user);
            showToast('Failed to create customer. Auth user rolled back.', 'error');
          } catch (deleteErr) {
            console.error('Rollback failed:', deleteErr);
            showToast('Error: ' + err.message, 'error');
          }
        } else {
          showToast(err.message, 'error');
        }
      } finally {
        submitBtn.classList.remove('btn-loading');
        submitBtn.innerHTML = 'Save Customer';
        lucide.createIcons();
      }
    });

      allow create: if request.auth != null;
    }
  }

    `);

    $('#pay-salary-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      try {
        await updateDoc(doc(db, 'salary_requests', id), { 
          status: 'paid',
          paidBy: currentUser.uid,
          paidDate: serverTimestamp(),
          method: data.method,
          trxId: data.trxId
        });
        await logActivity('Pay Salary', `Paid salary via ${data.method}`);
        showToast('Salary paid successfully', 'success');
        closeModal();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  };

  const renderInvoice = () => {
    const customers = currentRole === 'staff' 
      ? appState.users.filter(u => u.role === 'customer' && u.assignedStaff === currentUser.uid && (u.status === 'approved' || !u.status))
      : appState.users.filter(u => u.role === 'customer' && (u.status === 'approved' || !u.status));

    const container = document.getElementById('view-invoice');
    if (!container) return;

    container.innerHTML = `
      <div class="max-w-4xl mx-auto space-y-6 fade-in">
        <div class="glass rounded-2xl p-6 border border-[rgb(var(--border))]">
          <h3 class="font-bold text-lg mb-6">Generate Invoice</h3>
          <form id="invoice-form" class="space-y-4">
            <div class="grid md:grid-cols-2 gap-4">
              <div>
                <label class="text-sm font-medium mb-2 block">Select Customer *</label>
                <select id="invoice-customer" name="customerId" required class="w-full px-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]">
                  <option value="">Choose customer</option>
                  ${customers.map(c => `<option value="${c.id}" data-customer='${JSON.stringify(c)}'>${c.name} - ${c.mobile}</option>`).join('')}
                </select>
              </div>
              <div>
                <label class="text-sm font-medium mb-2 block">Amount *</label>
                <input type="number" name="amount" id="invoice-amount" required class="w-full px-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div><div>
                <label class="text-sm font-medium mb-2 block">Payment Method *</label>
                <select name="paymentMethod" required class="w-full px-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"><option value="">Select method</option><option value="bKash">bKash</option><option value="Nagad">Nagad</option><option value="Cash">Cash</option><option value="Bank">Bank Transfer</option></select></div><div>
                <label class="text-sm font-medium mb-2 block">Transaction ID</label>
                <input type="text" name="trxId" class="w-full px-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div><div>
                <label class="text-sm font-medium mb-2 block">Status *</label>
                <select name="status" required class="w-full px-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"><option value="paid">Paid</option><option value="unpaid">Unpaid</option></select></div><div>
                <label class="text-sm font-medium mb-2 block">Promise Date</label>
                <input type="date" name="promiseDate" class="w-full px-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></div><div class="md:col-span-2">
                <label class="text-sm font-medium mb-2 block">Notes</label>
                <textarea name="notes" rows="2" class="w-full px-4 py-3 rounded-xl border border-[rgb(var(--border))] bg-[rgb(var(--card))]"></textarea></div>
            </div>
            <div class="flex gap-3">
              <button type="submit" class="flex-1 py-3 rounded-xl bg-gradient-to-r from-sky-500 to-indigo-600 text-white font-semibold">Create Invoice</button>
              <button type="button" id="preview-invoice" class="px-6 py-3 rounded-xl border border-[rgb(var(--border))]">Preview</button>
            </div>
          </form>
        </div>
        <div id="invoice-preview" class="hidden"></div>
      </div>
    `;

    $('#invoice-customer').addEventListener('change', (e) => {
      const option = e.target.selectedOptions[0];
      if (option.value) {
        const customer = JSON.parse(option.dataset.customer);
        $('#invoice-amount').value = customer.packagePrice || '';
      }
    });

    $('#invoice-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);
      const customerOption = $('#invoice-customer').selectedOptions[0];
      const customer = JSON.parse(customerOption.dataset.customer);
      
      try {
        const billData = {
          ...data,
          amount: Number(data.amount),
          customerId: data.customerId,
          customerName: customer.name,
          customerMobile: customer.mobile,
          customerEmail: customer.email,
          customerPPPoE: customer.pppoeUser,
          packageName: customer.packageName,
          staffId: customer.assignedStaff || currentUser.uid,
          createdBy: currentUser.uid,
          createdAt: serverTimestamp(),
          promiseDate: data.promiseDate ? Timestamp.fromDate(new Date(data.promiseDate)) : null,
          invoiceNo: `INV-${Date.now()}`
        };
        
        const docRef = await addDoc(collection(db, 'bills'), billData);
        
        if (data.promiseDate) {
          await updateDoc(doc(db, 'users', data.customerId), {
            promiseDate: Timestamp.fromDate(new Date(data.promiseDate))
          });
        }
        
        await logActivity('Create Invoice', `Invoice for ${customer.name}: ${formatCurrency(data.amount)}`);
        showToast('Invoice created successfully', 'success');
        
        showInvoicePreview({ ...billData, id: docRef.id });
        e.target.reset();
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    $('#preview-invoice').addEventListener('click', () => {
      const formData = new FormData($('#invoice-form'));
      const data = Object.fromEntries(formData);
      const customerOption = $('#invoice-customer').selectedOptions[0];
      if (!customerOption.value) return showToast('Please select a customer', 'warning');
      const customer = JSON.parse(customerOption.dataset.customer);
      showInvoicePreview({ ...data, customer, invoiceNo: `INV-${Date.now()}` });
    });
  };

  window.createInvoiceFor = (customerId) => {
    showView('invoice');
    setTimeout(() => {
      $('#invoice-customer').value = customerId;
      $('#invoice-customer').dispatchEvent(new Event('change'));
    }, 100);
  };

  const showInvoicePreview = (bill) => {
    const customer = bill.customer || appState.users.find(u => u.id === bill.customerId);
    if (!customer) return showToast('Customer not found', 'error');
    
    const preview = `
      <div class="glass rounded-2xl p-6 border-[rgb(var(--border))]">
        <div class="flex items-center justify-between mb-6">
          <h3 class="font-bold text-lg">Invoice Preview</h3>
          <div class="flex gap-2 no-print">
            <button onclick="printInvoice('a4')" class="px-4 py-2 rounded-xl bg-sky-500/20 text-sky-600 text-sm font-semibold" type="button">Print A4</button>
            <button onclick="printInvoice('thermal')" class="px-4 py-2 rounded-xl bg-indigo-500/20 text-indigo-600 text-sm font-semibold" type="button">Print 58mm</button>
            <button onclick="sendInvoiceWhatsApp('${customer.whatsapp}','${bill.invoiceNo}')" class="px-4 py-2 rounded-xl bg-emerald-500/20 text-emerald-600 text-sm font-semibold" type="button">WhatsApp</button>
          </div>
        </div>
        
        <div id="invoice-a4" class="print-area print-a4 hidden">
          <div class="text-center mb-6 border-b-2 border-black pb-4">
            ${companySettings.logo ? `<img src="${companySettings.logo}" class="w-16 h-16 mx-auto mb-2">` : ''}
            <h1 class="text-2xl font-bold">${companySettings.companyName || "Own's Link"}</h1>
            <p class="text-sm">${companySettings.address || 'Internet Service Provider'}</p>
            <p class="text-sm">WhatsApp: ${companySettings.whatsapp || customer.whatsapp || ''}</p>
          </div>
          <div class="grid grid-cols-2 gap-4 mb-6 text-sm">
            <div>
              <p><strong>Invoice No:</strong> ${bill.invoiceNo}</p>
              <p><strong>Date:</strong> ${formatDate(bill.createdAt || new Date())}</p>
            </div>
            <div class="text-right">
              <p><strong>Customer:</strong> ${customer.name || '-'}</p>
              <p><strong>Mobile:</strong> ${customer.mobile || '-'}</p>
            </div>
          <table class="w-full border border-black mb-4 text-sm">
            <thead class="bg-gray-200">
              <tr><th class="border border-black p-2 text-left">Description</th><th class="border border-black p-2 text-right">Amount</th></tr>
            </thead>
            <tbody>
              <tr><td class="border border-black p-2">${customer.packageName || 'Internet Service'}</td><td class="border border-black p-2 text-right">${formatCurrency(bill.amount)}</td></tr>
            </tbody>
            <tfoot><tr><td class="border border-black p-2 font-bold">Total</td><td class="border border-black p-2 text-right font-bold">${formatCurrency(bill.amount)}</td></tr></tfoot>
          </table>
          <div class="grid grid-cols-2 gap-4 text-sm">
            <div><p><strong>Payment Method:</strong> ${bill.paymentMethod || '-'}</p><p><strong>TrxID:</strong> ${bill.trxId || '-'}</p></div>
            <div class="text-right"><p><strong>Status:</strong> ${bill.status?.toUpperCase() || '-'}</p></div>
          </div>
          <div class="text-center mt-8 text-xs">Thank you for your business!</div>
        </div>

        <div id="invoice-thermal" class="print-area print-thermal hidden mx-auto">
          <div class="text-center">
            ${companySettings.logo ? `<img src="${companySettings.logo}" class="w-12 h-12 mx-auto mb-1">` : ''}
            <h2 class="font-bold text-sm">${companySettings.companyName || "Own's Link"}</h2>
            <p class="text-[10px]">ইন্টারনেট বিল রসিদ</p>
            <p class="text-[10px]">WhatsApp: ${companySettings.whatsapp || ''}</p>
            <div class="border-t border-dashed my-1"></div>
          </div>
          <div class="text-[11px] space-y-0.5">
            <div class="flex justify-between"><span>Invoice:</span><span>${bill.invoiceNo}</span></div>
            <div class="flex justify-between"><span>Date:</span><span>${formatDate(bill.createdAt || new Date())}</span></div>
            <div class="flex justify-between"><span>Name:</span><span>${(customer.name || '-').substring(0,15)}</span></div>
            <div class="flex justify-between"><span>Mobile:</span><span>${customer.mobile || '-'}</span></div>
            <div class="flex justify-between"><span>PPPoE:</span><span>${customer.pppoeUser || '-'}</span></div>
            <div class="border-t border-dashed my-1"></div>
            <div class="flex justify-between"><span>Package:</span><span>${customer.packageName || '-'}</span></div>
            <div class="flex justify-between font-bold"><span>Amount:</span><span>${formatCurrency(bill.amount)}</span></div>
            <div class="flex justify-between"><span>Method:</span><span>${bill.paymentMethod || '-'}</span></div>
            <div class="flex justify-between"><span>TrxID:</span><span>${bill.trxId || '-'}</span></div>
            <div class="flex justify-between"><span>Status:</span><span>${bill.status?.toUpperCase() || '-'}</span></div>
            <div class="border-t border-dashed my-1"></div>
          </div>
          <div class="text-center text-[10px] mt-2">ধন্যবাদ | Thank You</div>
        </div>

        <div class="text-center py-8 text-slate-500 no-print">
          <i data-lucide="file-check" class="w-12 h-12 mx-auto mb-2 text-emerald-600"></i>
          <p>Invoice ready. Use buttons above to print or send.</p>
        </div>
      </div>
    `;
    $('#invoice-preview').innerHTML = preview;
    $('#invoice-preview').classList.remove('hidden');
    lucide.createIcons();
  };

  window.printInvoice = (type) => {
    const a4 = $('#invoice-a4');
    const thermal = $('#invoice-thermal');
    a4.classList.add('hidden');
    thermal.classList.add('hidden');
    if (type === 'a4') a4.classList.remove('hidden');
    else thermal.classList.remove('hidden');
    window.print();
  };

  window.sendInvoiceWhatsApp = (number, invoiceNo) => {
    const msg = `Hello! Your invoice ${invoiceNo} has been generated. Thank you for your payment. - ${companySettings.companyName || 'OwnsBill'}`;
    sendWhatsApp(number, msg);
  };

  window.sendWhatsApp = (number, message) => {
    const clean = number?.replace(/\D/g, '');
    if (!clean) return showToast('Invalid WhatsApp number', 'error');
    const url = `https://wa.me/${clean}?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
  };

  const showModal = (content) => {
    $('#modal-container').innerHTML = `
      <div class="fixed inset-0 z-[80] bg-black/50 backdrop-blur-sm flex items-center justify-center p-4" onclick="closeModal()">
        <div class="glass rounded-3xl shadow-2xl border border-[rgb(var(--border))] w-full max-w-2xl scale-in" onclick="event.stopPropagation()">
          ${content}
        </div>
      </div>
    `;
    lucide.createIcons();
  };

  window.closeModal = () => {
    $('#modal-container').innerHTML = '';
  };

  const updateCommandPalette = () => {
    const commands = {
      admin: [
        { label: 'Dashboard', action: () => showView('dashboard'), icon: 'layout-dashboard' },
        { label: 'Add Customer', action: () => showCustomerForm(), icon: 'user-plus' },
        { label: 'Add Staff', action: () => showStaffForm(), icon: 'user-cog' },
        { label: 'Create Invoice', action: () => showView('invoice'), icon: 'file-text' },
        { label: 'View Reports', action: () => showView('reports'), icon: 'bar-chart-3' },
        { label: 'Staff Accounts', action: () => showView('staffaccounts'), icon: 'wallet' },
        { label: 'Approvals', action: () => showView('approvals'), icon: 'check-circle' },
        { label: 'Settings', action: () => showView('settings'), icon: 'settings' }
      ],
      staff: [
        { label: 'Dashboard', action: () => showView('dashboard'), icon: 'layout-dashboard' },
        { label: 'My Customers', action: () => showView('mycustomers'), icon: 'users' },
        { label: 'Add Customer', action: () => showCustomerForm(), icon: 'user-plus' },
        { label: 'Create Invoice', action: () => showView('invoice'), icon: 'file-text' },
        { label: 'My Wallet', action: () => showView('mywallet'), icon: 'wallet' },
        { label: 'View Bills', action: () => showView('bills'), icon: 'receipt' }
      ],
      customer: [
        { label: 'Dashboard', action: () => showView('dashboard'), icon: 'layout-dashboard' },
        { label: 'My Bills', action: () => showView('mybills'), icon: 'receipt' },
        { label: 'Submit Complaint', action: () => handleComplaintSubmit(), icon: 'message-circle-warning' },
        { label: 'Chat Support', action: () => showView('chat'), icon: 'messages-square' }
      ]
    };

    const cmdResults = $('#cmd-results');
    const renderCommands = (filter = '') => {
      const list = commands[currentRole].filter(c => c.label.toLowerCase().includes(filter.toLowerCase()));
      cmdResults.innerHTML = list.map((cmd, i) => `
        <button onclick="(${cmd.action})(); toggleCommandPalette(false)" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-[rgb(var(--border))] text-left ${i===0?'bg-[rgb(var(--border))]':''}" type="button">
          <i data-lucide="${cmd.icon}" class="w-5 h-5 text-sky-600"></i>
          <span class="font-medium">${cmd.label}</span>
        </button>
      `).join('') || '<div class="p-4 text-center text-slate-500 text-sm">No results</div>';
      lucide.createIcons();
    };

    renderCommands();
    $('#cmd-search')?.addEventListener('input', (e) => renderCommands(e.target.value));
  };

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      toggleCommandPalette();
    }
    if (e.key === 'Escape') {
      toggleCommandPalette(false);
      closeModal();
      if (sidebarOpen && window.innerWidth < 768) closeSidebar();
      closeMobileProfile();
      closeUserDropdown();
    }
  });

  window.appState = appState;
  window.showInvoicePreview = showInvoicePreview;
</script>

<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    firebase.auth().onAuthStateChanged(async (user) => {
        if (user) {
            const userDoc = await firebase.firestore().collection('users').doc(user.uid).get();
            console.log('[Debug] User:', user.email, 'Role:', userDoc.data()?.role, 'Status:', userDoc.data()?.status);
            if (userDoc.data()?.role !== 'admin' || userDoc.data()?.status !== 'approved') {
                console.error('[Debug] Not admin or not approved. Activity Log will be empty.');
            }
        }
    });
});
</script>
