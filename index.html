  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ওন্স বিল - ISP বিলিং সিস্টেম</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Noto Sans Bengali', sans-serif;
    }
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .gradient-sidebar {
      background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      transition: all 0.3s ease;
    }
    .card:hover {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      transform: translateY(-2px);
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    .input-field {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      transition: all 0.3s ease;
      font-size: 14px;
    }
    .input-field:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .sidebar-link {
      padding: 12px 16px;
      border-radius: 8px;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #cbd5e1;
    }
    .sidebar-link:hover, .sidebar-link.active {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      transform: translateX(4px);
    }
    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-success { background: #d1fae5; color: #065f46; }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #dbeafe; color: #1e40af; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }
    .modal.active { display: flex; }
    .animate-slide-in {
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .table-responsive {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      min-width: 100%;
    }
    @media print {
      .no-print { display: none !important; }
      body { background: white; }
    }
  </style>

  <script>
    // Data Structure - Keep existing structure intact
    let appData = {
      users: [
        { id: 1, name: 'অ্যাডমিন ইউজার', username: 'admin', password: 'admin123', role: 'admin', phone: '01700000000' },
        { id: 2, name: 'স্টাফ ইউজার', username: 'staff', password: 'staff123', role: 'staff', phone: '01711111111' },

      areas: [
        { id: 1, name: 'ঢাকা উত্তর' },
        { id: 2, name: 'ঢাকা দক্ষিণ' }

      customers: [
        { id: 1, name: 'করিম আলী', phone: '01733333333', area: 1, zone: 1, package: 2, staff: 2, address: 'মিরপুর-১০' },
        { id: 2, name: 'সালমা বেগম', phone: '01744444444', area: 1, zone: 2, package: 1, staff: 2, address: 'উত্তরা সেক্টর-৩' },
        { id: 3, name: 'রহিম উদ্দিন', phone: '01722222222', area: 1, zone: 1, package: 1, staff: 2, address: 'মিরপুর-১' }
      ],
      invoices: [
        { id: 1, customerId: 1, customerName: 'করিম আলী', package: '১০ Mbps', amount: 800, month: '2025-09', date: '2025-09-05', status: 'paid', staffId: 2 },
        { id: 2, customerId: 2, customerName: 'সালমা বেগম', package: '৫ Mbps', amount: 500, month: '2025-09', date: '2025-09-06', status: 'unpaid', staffId: 2 },
        { id: 3, customerId: 3, customerName: 'রহিম উদ্দিন', package: '৫ Mbps', amount: 500, month: '2025-09', date: '2025-09-07', status: 'paid', staffId: 2 },
        { id: 4, customerId: 3, customerName: 'রহিম উদ্দিন', package: '৫ Mbps', amount: 500, month: '2025-08', date: '2025-08-05', status: 'paid', staffId: 2 }
      ]
    };

    let currentUser = null;
    let currentPage = 'dashboard';

    // Load from localStorage
    function loadData() {
      const saved = localStorage.getItem('ownsBillData');
      if (saved) appData = JSON.parse(saved);
    }

    function saveData() {
      localStorage.setItem('ownsBillData', JSON.stringify(appData));
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      updateDate();
      setInterval(updateDate, 60000);
    });

    function updateDate() {
      const now = new Date();
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('currentDate').textContent = now.toLocaleDateString('bn-BD', options);
    }

    // Auth
    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const userType = document.getElementById('userType').value;

      const user = appData.users.find(u => u.username === username && u.password === password && u.role === userType);
      
      if (user) {
        currentUser = user;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        document.getElementById('loggedUserName').textContent = user.name;
        document.getElementById('loggedUserRole').textContent = userType === 'admin' ? 'অ্যাডমিন' : userType === 'staff' ? 'স্টাফ' : 'কাস্টমার';
        setupSidebar(userType);
        loadPage('dashboard');
      } else {
        alert('ভুল ইউজারনেম বা পাসওয়ার্ড!');
      }
    }

    function logout() {
      currentUser = null;
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('appScreen').classList.add('hidden');
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    // Navigation Setup
    function setupSidebar(role) {
      const nav = document.getElementById('sidebarNav');
      let menu = '';
      
      if (role === 'admin') {
        menu = `
          <div class="sidebar-link active" onclick="loadPage('dashboard')"><i class="fas fa-home"></i><span>ড্যাশবোর্ড</span></div>
          <div class="sidebar-link" onclick="loadPage('customers')"><i class="fas fa-users"></i><span>কাস্টমার</span></div>
          <div class="sidebar-link" onclick="loadPage('areas')"><i class="fas fa-map-marked-alt"></i><span>এরিয়া ও জোন</span></div>
          <div class="sidebar-link" onclick="loadPage('packages')"><i class="fas fa-box"></i><span>প্যাকেজ</span></div>
          <div class="sidebar-link" onclick="loadPage('invoices')"><i class="fas fa-file-invoice"></i><span>বিল তৈরি</span></div>
          <div class="sidebar-link" onclick="loadPage('reports')"><i class="fas fa-chart-bar"></i><span>রিপোর্ট</span></div>
          <div class="sidebar-link" onclick="loadPage('staff')"><i class="fas fa-user-tie"></i><span>স্টাফ ম্যানেজমেন্ট</span></div>
        `;
      } else if (role === 'staff') {
        menu = `
          <div class="sidebar-link active" onclick="loadPage('dashboard')"><i class="fas fa-home"></i><span>ড্যাশবোর্ড</span></div>
          <div class="sidebar-link" onclick="loadPage('customers')"><i class="fas fa-users"></i><span>কাস্টমার</span></div>
          <div class="sidebar-link" onclick="loadPage('invoices')"><i class="fas fa-file-invoice"></i><span>বিল তৈরি</span></div>
          <div class="sidebar-link" onclick="loadPage('reports')"><i class="fas fa-chart-bar"></i><span>বিল রিপোর্ট</span></div>
        `;
      } else {
        menu = `
          <div class="sidebar-link active" onclick="loadPage('dashboard')"><i class="fas fa-home"></i><span>ড্যাশবোর্ড</span></div>
          <div class="sidebar-link" onclick="loadPage('myBills')"><i class="fas fa-file-invoice"></i><span>আমার বিল</span></div>
          <div class="sidebar-link" onclick="loadPage('profile')"><i class="fas fa-user"></i><span>প্রোফাইল</span></div>
        `;
      }
      nav.innerHTML = menu;
    }

    // Page Loader
    function loadPage(page) {
      currentPage = page;
      document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
      event?.target?.closest('.sidebar-link')?.classList.add('active');
      
      const mainContent = document.getElementById('mainContent');
      
      switch(page) {
        case 'dashboard':
          loadDashboard();
          break;
        case 'customers':
          loadCustomers();
          break;
        case 'areas':
          loadAreas();
          break;
        case 'packages':
          loadPackages();
          break;
        case 'invoices':
          loadInvoices();
          break;
        case 'reports':
          loadReports();
          break;
        case 'staff':
          loadStaff();
          break;
        case 'myBills':
          loadMyBills();
          break;
        case 'profile':
          loadProfile();
          break;
      }
      
      if (window.innerWidth < 1024) toggleSidebar();
    }

    // Dashboard

      const totalRevenue = appData.invoices.filter(i => i.status === 'paid').reduce((sum, i) => sum + i.amount, 0);
      const unpaidBills = appData.invoices.filter(i => i.status === 'unpaid').length;
      const totalInvoices = appData.invoices.length;

      const content = `
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6 mb-6">
          <div class="card p-6">
            <div class="flex items-center justify-between">
              <div>

                <h3 class="text-3xl font-bold text-gray-800">${totalCustomers}</h3>
              </div>
              <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center">
                <i class="fas fa-users text-blue-600 text-xl"></i>
              </div>
            </div>
          </div>
          
          <div class="card p-6">
            <div class="flex items-center justify-between">

              </div>
              <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center">

              </div>
            </div>
          </div>

    function addCustomer() {
      const name = document.getElementById('newCustName').value;
      const phone = document.getElementById('newCustPhone').value;
      const area = document.getElementById('newCustArea').value;
      const zone = document.getElementById('newCustZone').value;
      const package = document.getElementById('newCustPackage').value;
      const staff = document.getElementById('newCustStaff').value;
      const address = document.getElementById('newCustAddress').value;
      
      if (!name || !phone || !area || !zone || !package) {
        alert('সব ফিল্ড পূরণ করুন!');
        return;
      }
      
      const newId = Math.max(...appData.customers.map(c => c.id), 0) + 1;
      appData.customers.push({
        id: newId,
        name: name.trim(),
        phone: phone.trim(),
        area: parseInt(area),
        zone: parseInt(zone),
        package: parseInt(package),
        staff: staff ? parseInt(staff) : null,
        address: address.trim()
      });
      
      // Also add to users if needed
      const newUserId = Math.max(...appData.users.map(u => u.id), 0) + 1;
      appData.users.push({
        id: newUserId,
        name: name.trim(),
        username: phone.trim(),
        password: '123456',
        role: 'customer',
        phone: phone.trim(),
        area: parseInt(area),
        zone: parseInt(zone),
        package: parseInt(package),
        staff: staff ? parseInt(staff) : null
      });
      
      saveData();
      closeModal('addCustomerModal');
      loadCustomers();
    }

                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">অ্যাকশন</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-200">
                    ${appData.invoices.slice(-10).reverse().map(inv => `
                      <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3 text-sm text-gray-800">${inv.customerName}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${inv.month}</td>
                        <td class="px-4 py-3 text-sm font-semibold text-gray-800">৳${inv.amount}</td>
                        <td class="px-4 py-3 text-sm">
                          <span class="badge ${inv.status === 'paid' ? 'badge-success' : 'badge-warning'}">
                            ${inv.status === 'paid' ? 'পরিশোধিত' : 'অপরিশোধিত'}

                        </td>
                        <td class="px-4 py-3 text-sm">
                          <button onclick="viewInvoice(${inv.id})" class="text-blue-600 hover:text-blue-800 mr-2"><i class="fas fa-eye"></i></button>

      `;
      document.getElementById('mainContent').innerHTML = content;
      
      // Set current month
      const now = new Date();
      const monthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      document.getElementById('invoiceMonth').value = monthStr;
    }

    // Fix #2: Customer select করলে package, price auto fill
    function loadCustomerPackage() {
      const customerId = document.getElementById('invoiceCustomer').value;
      if (!customerId) {
        document.getElementById('invoicePackage').value = '';
        document.getElementById('invoiceAmount').value = '';
        return;
      }
      
      const customer = appData.customers.find(c => c.id == customerId);
      if (customer) {
        const pkg = appData.packages.find(p => p.id === customer.package);
        if (pkg) {
          document.getElementById('invoicePackage').value = pkg.name;
          document.getElementById('invoiceAmount').value = pkg.price;
        }
      }
    }

    function generateInvoice() {
      const customerId = document.getElementById('invoiceCustomer').value;
      const month = document.getElementById('invoiceMonth').value;
      const amount = document.getElementById('invoiceAmount').value;
      const packageName = document.getElementById('invoicePackage').value;
      
      if (!customerId || !month || !amount) {
        alert('সব ফিল্ড পূরণ করুন!');
        return;
      }
      
      const customer = appData.customers.find(c => c.id == customerId);
      if (!customer) {
        alert('কাস্টমার পাওয়া যায়নি!');
        return;
      }
      
      const newId = Math.max(...appData.invoices.map(i => i.id), 0) + 1;
      const invoice = {
        id: newId,
        customerId: customer.id,
        customerName: customer.name,
        package: packageName,
        amount: parseInt(amount),
        month: month,
        date: new Date().toISOString().split('T')[0],
        status: 'unpaid',
        staffId: currentUser.id
      };
      
      appData.invoices.push(invoice);
      saveData();
      loadInvoices();
      alert('বিল সফলভাবে তৈরি হয়েছে!');
    }

    function markAsPaid(id) {
      if (confirm('এই বিল পরিশোধিত হিসেবে মার্ক করবেন?')) {
        const invoice = appData.invoices.find(i => i.id === id);
        if (invoice) {
          invoice.status = 'paid';
          saveData();
          loadInvoices();
        }
      }
    }

    function printInvoice() {
      window.print();
    }

    // Reports - Fix #3: Staff শুধু নিজের বিল দেখবে

      document.getElementById('pageTitle').textContent = 'রিপোর্ট';

      let invoices = appData.invoices;
      
      // Fix #3: Staff শুধু নিজের বিল দেখবে

        invoices = invoices.filter(i => i.staffId === currentUser.id);
      }
      
      const totalRevenue = invoices.filter(i => i.status === 'paid').reduce((sum, i) => sum + i.amount, 0);

              <tbody class="divide-y divide-gray-200">
                ${invoices.map(inv => `

<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
import { getFirestore, doc, getDoc } from "firebase/firestore";

const firebaseConfig = {
  apiKey: "AIzaSyBZUlhoH3pPZWBmBZko-SfIJpV6jBoefRM",
  authDomain: "owns-billing.firebaseapp.com",
  projectId: "owns-billing",
  storageBucket: "owns-billing.firebasestorage.app",
  messagingSenderId: "1036958677443",
  appId: "1:1036958677443:web:5541baa54edc6e5f582576"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.firebaseApp = app;
window.firebaseAuth = auth;
window.firebaseDb = db;

// Replace demo login function
window.handleLogin = async function() {
  const email = document.getElementById('email')?.value || document.querySelector('input[type="text"]')?.value;
  const password = document.getElementById('password')?.value || document.querySelector('input[type="password"]')?.value;
  const roleSelect = document.getElementById('role')?.value;
  
  if (!email || !password) {
    alert('ইমেইল এবং পাসওয়ার্ড দিন');
    return;
  }
  
  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;
    
    // Check users collection for role and status
    const userDocRef = doc(db, "users", user.uid);
    const userDoc = await getDoc(userDocRef);
    
    if (!userDoc.exists()) {
      await signOut(auth);
      alert('ইউজার ডেটা পাওয়া যায়নি। অ্যাডমিনের সাথে যোগাযোগ করুন।');
      return;
    }
    
    const userData = userDoc.data();
    
    if (userData.status !== 'approved') {
      await signOut(auth);
      alert('আপনার অ্যাকাউন্ট এখনো অ্যাপ্রুভ হয়নি। অ্যাডমিন অ্যাপ্রুভালের জন্য অপেক্ষা করুন।');
      return;
    }
    
    // Check if selected role matches
    if (roleSelect && userData.role !== roleSelect && roleSelect !== 'admin') {
      if (userData.role !== 'admin') {
        await signOut(auth);
        alert('আপনার রোল ম্যাচ করেনি।');
        return;
      }
    }
    
    // Store user data globally
    window.currentUser = {
      uid: user.uid,
      email: user.email,
      role: userData.role,
      name: userData.name || user.email
    };
    
    // Call original success function if exists, else reload
    if (typeof window.onLoginSuccess === 'function') {
      window.onLoginSuccess(window.currentUser);
    } else {
      alert('লগইন সফল! ' + window.currentUser.name);
      location.reload();
    }
    
  } catch (error) {
    console.error(error);
    if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
      alert('ভুল ইমেইল বা পাসওয়ার্ড!');
    } else if (error.code === 'auth/user-not-found') {
      alert('এই ইমেইলে কোন ইউজার নেই!');
    } else {
      alert('লগইন এরর: ' + error.message);
    }
  }
}

// Auto-check login state
onAuthStateChanged(auth, async (user) => {
  if (user) {
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists() && userDoc.data().status === 'approved') {
      window.currentUser = {
        uid: user.uid,
        email: user.email,
        role: userDoc.data().role,
        name: userDoc.data().name || user.email
      };
      if (typeof window.showDashboard === 'function') {
        window.showDashboard(window.currentUser);
      }
    }
  }
});

// Replace old login button onclick
document.addEventListener('DOMContentLoaded', () => {
  const loginBtn = document.querySelector('button[onclick*="login"], button:contains("লগইন")');
  if (loginBtn) {
    loginBtn.onclick = window.handleLogin;
  }
});
</script>
